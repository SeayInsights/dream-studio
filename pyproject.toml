[tool.black]
line-length = 100

[tool.flake8]
max-line-length = 100
per-file-ignores = [
    "tests/*:E501,F401",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["hooks/lib", "packs/domains/domain_lib"]
omit = [
    "hooks/lib/workflow_state.py",
    "hooks/lib/traceability.py",
]

[tool.coverage.report]
fail_under = 70
