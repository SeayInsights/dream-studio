# Analyze Skill — Mode Configuration
# Each mode defines which analysts run, how they're dispatched, and how signals are synthesized.
# To add a custom mode: add an entry here with an analyst list referencing YAMLs in analysts/

evaluate-offer:
  status: tested
  description: "Multi-perspective job/contract offer evaluation"
  analysts:
    - compensation
    - growth
    - risk
    - lifestyle
  quick_analysts:
    - compensation
    - risk
  max_parallel: 2
  min_quorum: 3
  raw_input: false
  always_synthesize: false
  synthesis:
    strategy: weighted-vote
    disagreement_threshold: 2
    output: decision-memo

evaluate-gig:
  status: tested
  description: "Freelance/consulting opportunity assessment"
  analysts:
    - profitability
    - feasibility
    - scope-risk
    - timeline
  quick_analysts:
    - profitability
    - scope-risk
  max_parallel: 2
  min_quorum: 3
  raw_input: false
  always_synthesize: false
  synthesis:
    strategy: weighted-vote
    disagreement_threshold: 2
    output: decision-memo

evaluate-data:
  status: tested
  description: "Multi-angle dataset or BI analysis"
  analysts:
    - anomaly
    - trend
    - hypothesis
    - validation
  quick_analysts:
    - anomaly
    - trend
  max_parallel: 2
  min_quorum: 3
  raw_input: true
  always_synthesize: false
  synthesis:
    strategy: consensus-report
    disagreement_threshold: 2
    output: risk-report

evaluate-strategy:
  status: experimental
  description: "C-level multi-perspective business strategy evaluation"
  analysts:
    - cfo
    - cto
    - cmo
    - cpo
    - ceo
  quick_analysts:
    - cfo
    - ceo
  max_parallel: 2
  min_quorum: 4
  raw_input: false
  always_synthesize: true
  synthesis:
    strategy: weighted-vote
    disagreement_threshold: 2
    output: decision-memo

evaluate-content:
  status: experimental
  description: "Content quality and SEO readiness assessment"
  analysts:
    - seo
    - cmo-content
  quick_analysts:
    - seo
  max_parallel: 2
  min_quorum: 1
  raw_input: true
  always_synthesize: false
  synthesis:
    strategy: weighted-vote
    disagreement_threshold: 2
    output: decision-memo
