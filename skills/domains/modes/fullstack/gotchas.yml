version: 1.0

avoid:
  - id: contract-drift
    severity: critical
    discovered: 2026-05-02
    title: "API contract must stay in sync between frontend and backend"
    context: "If frontend and backend are built in parallel and the API contract changes mid-build, one side ends up out of sync. This leads to integration failures and runtime errors that are difficult to debug."
    fix: "Always run integrate mode after parallel frontend/backend builds to detect drift. The integrate mode validates that frontend requests match backend responses."

  - id: stack-mismatch
    severity: high
    discovered: 2026-05-02
    title: "Backend auto-detection may pick wrong stack if multiple signals conflict"
    context: "Backend mode auto-detects stack from project files but if multiple signals conflict (e.g. both package.json and requirements.txt exist), it may pick the wrong one, leading to incorrect scaffolding and tooling recommendations."
    fix: "When signals conflict, ask the user instead of guessing. Backend mode should prompt for explicit stack selection when ambiguity is detected."

  - id: duplicate-website-logic
    severity: high
    discovered: 2026-05-02
    title: "Frontend mode must delegate to domains:website, never duplicate its pipeline logic"
    context: "If frontend mode re-implements website skill logic (responsive design, build pipeline, deployment patterns), you create maintenance burden and divergence. Changes to website patterns won't propagate to frontend builds."
    fix: "Frontend SKILL.md should invoke website skill, not copy its steps. Frontend mode handles API integration; layout/styling/build comes from website domain."

  - id: saas-build-bypass
    severity: medium
    discovered: 2026-05-02
    title: "Cloudflare preset must delegate to saas-build mode, not re-implement Workers patterns"
    context: "When cloudflare preset is selected, backend should delegate to saas-build mode. If backend re-implements Workers patterns (bindings, KV, migrations), you duplicate logic and miss saas-build optimizations."
    fix: "Cloudflare preset explicitly invokes domains:saas-build. Backend mode never implements Workers-specific patterns directly."

best_practices:
  - id: contract-first
    title: "Always generate API contract before starting frontend or backend work"
    context: "The API contract (request/response schemas, endpoints, error codes) is the shared truth between frontend and backend. Generating it first prevents drift and allows parallel work."

  - id: integrate-after-parallel
    title: "If frontend and backend run in parallel, always run integrate mode to verify contract compliance"
    context: "Integrate mode validates that frontend calls match backend responses. This catches contract drift early before code review or deployment."

edge_cases:
  - id: existing-backend
    title: "User has an existing backend and only needs frontend"
    context: "Frontend mode should work independently without requiring a backend mode run. The frontend can consume existing API documentation."

  - id: unknown-stack
    title: "User's stack isn't in presets"
    context: "Backend should fall back to generic REST patterns and ask the user for guidance on tooling, database, and deployment target."

limitations:
  - id: no-runtime-scaffold
    title: "Fullstack skill generates instructions and patterns, not actual project scaffolding code"
    context: "The fullstack skill creates SKILL.md files that guide Claude's behavior at build time. It does not generate boilerplate code, starter templates, or project structure directly. Those are generated by build mode when invoked with the SKILL.md instructions."

deprecated: []
