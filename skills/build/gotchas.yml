version: 1.0

avoid:
  - id: skip-constitution-read
    severity: critical
    discovered: 2026-04-29
    title: "Never start executing tasks without reading CONSTITUTION.md first"
    context: "Skipping CONSTITUTION.md causes architectural violations mid-build — wrong patterns, wrong files, incompatible approaches. Discovered during DreamySuite builds where canvas SSOT was ignored."
    fix: "Step 0: if .planning/CONSTITUTION.md exists, read it before touching any file. Same for GOTCHAS.md."

  - id: parallel-same-file
    severity: critical
    discovered: 2026-04-29
    title: "Never dispatch parallel subagents that write to the same file"
    context: "Parallel agents with overlapping file scope create race conditions — last writer wins, earlier work is silently lost. Build verification won't catch this."
    fix: "Group tasks into waves. Within a wave, each agent must own distinct files. If two tasks need the same file, make them sequential."

  - id: subagent-file-path-only
    severity: high
    discovered: 2026-04-29
    title: "Never give subagents a file path to read — provide the full text"
    context: "Subagents have isolated context. Telling them 'read spec.md' adds an unnecessary file read and can fail if the working directory differs."
    fix: "In the dispatch prompt, paste the full task text and any relevant spec sections inline."

  - id: continue-past-major-drift
    severity: high
    discovered: 2026-04-29
    title: "Never continue past major drift without explicit Director approval"
    context: "Major drift (new dependency, scope change, architecture change) that proceeds silently compounds — later tasks build on the drifted state and become hard to undo."
    fix: "Stop on major drift. Output: 'Drift detected: [what and why]. Adjust plan or revert?' Wait for answer."

  - id: downgrade-lint-during-build
    severity: high
    discovered: 2026-04-19
    title: "Never downgrade lint/TS rules to unblock a build task"
    context: "Lowering rules mid-build passes the task check but poisons the codebase. Later tasks inherit the false-green state."
    fix: "If lint errors block a build task, stop and fix the errors in a sub-task. Never trade rule integrity for task completion speed."

best_practices:
  - id: commit-per-task
    title: "Commit after every task, not after every wave"
    context: "Batching commits makes it impossible to bisect failures. One task = one commit with the task name in the message."

  - id: checkpoint-every-three
    title: "Output a checkpoint after every 3 tasks or 30 minutes"
    context: "Long builds lose state silently. Checkpoints surface drift and context growth before they become unrecoverable."

  - id: compact-at-75-percent
    title: "Run /compact proactively after each wave when context approaches 75%"
    context: "Sessions consistently hit the auto-handoff threshold at 75-80%. By then it's too late — the handoff interrupts mid-build. Running /compact between waves (after every 3-4 tasks) keeps context healthy and prevents forced handoffs."

edge_cases:
  - id: simple-vs-subagent-threshold
    title: "<=3 tightly coupled tasks: simple mode. >=4 or independent tasks: subagent mode"
    context: "Subagent mode for 2 coupled tasks creates more overhead than value. Simple mode for 6 independent tasks blows context."

limitations:
  - id: no-cross-wave-state
    title: "Subagents in the same wave cannot share state"
    context: "Each subagent gets only its dispatch prompt. If wave B needs output from wave A, the controller must collect and re-inject that output."

deprecated: []
