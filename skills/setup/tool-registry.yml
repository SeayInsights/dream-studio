tools:
  gh:
    name: GitHub CLI
    description: "Official GitHub command-line interface for managing repositories, issues, PRs, and workflows"
    detect_command:
      windows: "where gh"
      mac: "which gh"
      linux: "which gh"
    version_command: "gh --version"
    min_version: "2.40.0"
    upgrade_command:
      windows: "choco upgrade gh -y"
      mac: "brew upgrade gh"
      linux: "sudo apt-get install --only-upgrade gh"
    install_command:
      windows: "choco install gh -y"
      mac: "brew install gh"
      linux: "curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && echo 'deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main' | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null && sudo apt-get update && sudo apt-get install gh -y"
    what_it_unlocks:
      - dream-studio:core (git workflows, PR creation/review)
      - dream-studio:domains (client-work with GitHub integration)
      - GitHub API access (fallback when API key needed)
    docs_url: "https://cli.github.com/manual"

  firecrawl:
    name: Firecrawl MCP Server
    description: "MCP server for web scraping, crawling, search, and LLM-ready extraction via Firecrawl API"
    detect_command:
      windows: "claude mcp list 2>NUL | findstr firecrawl-mcp"
      mac: "claude mcp list 2>/dev/null | grep firecrawl-mcp"
      linux: "claude mcp list 2>/dev/null | grep firecrawl-mcp"
    version_command: "npm list -g firecrawl-mcp --depth=0 2>NUL || echo unknown"
    min_version: "3.0.0"
    upgrade_command:
      windows: "npm update -g firecrawl-mcp"
      mac: "npm update -g firecrawl-mcp"
      linux: "npm update -g firecrawl-mcp"
    install_command:
      windows: "claude mcp add --scope user firecrawl-mcp -e FIRECRAWL_API_KEY=<key> -- npx -y firecrawl-mcp"
      mac: "claude mcp add --scope user firecrawl-mcp -e FIRECRAWL_API_KEY=<key> -- npx -y firecrawl-mcp"
      linux: "claude mcp add --scope user firecrawl-mcp -e FIRECRAWL_API_KEY=<key> -- npx -y firecrawl-mcp"
    what_it_unlocks:
      - dream-studio:core (web research, web.md content extraction, site mapping)
      - dream-studio:domains (web scraping for client work, competitive research)
      - dream-studio:security (DAST site crawling and findings extraction)
      - dream-studio:career (job portal scraping via firecrawl_search)
    docs_url: "https://github.com/mendableai/firecrawl-mcp-server"

  playwright:
    name: Playwright
    description: "Browser automation framework for headless testing, screenshot capture, and dynamic content interaction"
    detect_command:
      windows: "where playwright"
      mac: "which playwright"
      linux: "which playwright"
    version_command: "playwright --version"
    min_version: "1.40.0"
    upgrade_command:
      windows: "pip install --upgrade playwright && playwright install"
      mac: "pip install --upgrade playwright && playwright install"
      linux: "pip install --upgrade playwright && playwright install"
    install_command:
      windows: "pip install playwright && playwright install"
      mac: "pip install playwright && playwright install"
      linux: "pip install playwright && playwright install"
    what_it_unlocks:
      - dream-studio:quality (UI testing, screenshot verification)
      - dream-studio:security (DAST browser-based testing)
      - dream-studio:domains (UI automation testing)
    docs_url: "https://playwright.dev"

  npm:
    name: Node Package Manager
    description: "JavaScript/TypeScript package manager for installing, managing, and running Node.js dependencies"
    detect_command:
      windows: "where npm"
      mac: "which npm"
      linux: "which npm"
    version_command: "npm --version"
    min_version: "9.0.0"
    upgrade_command:
      windows: "npm install -g npm@latest"
      mac: "npm install -g npm@latest"
      linux: "npm install -g npm@latest"
    install_command:
      windows: "choco install nodejs -y"
      mac: "brew install node"
      linux: "sudo apt-get install nodejs npm"
    what_it_unlocks:
      - dream-studio:domains (SaaS builds, frontend frameworks)
      - dream-studio:workflow (package scripts execution)
      - All Node.js based skills and scripts
    docs_url: "https://docs.npmjs.com"

  python:
    name: Python
    description: "Python interpreter and runtime for executing Python scripts and packages across dream-studio"
    detect_command:
      windows: "where py"
      mac: "which python3"
      linux: "which python3"
    version_command: "python --version"
    min_version: "3.10.0"
    upgrade_command:
      windows: "choco upgrade python -y"
      mac: "brew upgrade python@3.12"
      linux: "sudo apt-get install python3.12 python3.12-venv"
    install_command:
      windows: "choco install python -y"
      mac: "brew install python@3.12 && brew link python@3.12"
      linux: "sudo apt-get install python3.12 python3.12-venv"
    what_it_unlocks:
      - dream-studio:core (all Python-based skills)
      - dream-studio:quality (linting, formatting, testing)
      - dream-studio:security (vulnerability scanning, binary analysis)
      - All dream-studio skills (core runtime dependency)
    docs_url: "https://www.python.org/downloads"

  node:
    name: Node.js
    description: "JavaScript runtime for executing Node.js scripts, CLI tools, and server applications"
    detect_command:
      windows: "where node"
      mac: "which node"
      linux: "which node"
    version_command: "node --version"
    min_version: "18.0.0"
    upgrade_command:
      windows: "choco upgrade nodejs -y"
      mac: "brew upgrade node"
      linux: "sudo apt-get install nodejs"
    install_command:
      windows: "choco install nodejs -y"
      mac: "brew install node"
      linux: "sudo apt-get install nodejs"
    what_it_unlocks:
      - dream-studio:domains (SaaS builds, web development)
      - dream-studio:workflow (package scripts, CLI execution)
      - Frontend tooling and build systems
    docs_url: "https://nodejs.org/en/download"
