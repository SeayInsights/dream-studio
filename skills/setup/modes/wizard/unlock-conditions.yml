# Progressive unlock conditions
# When user's message/invocation matches a trigger pattern, unlock the associated pack

unlock_triggers:
  # Security pack — unlocks when user shows security intent
  - pack: security
    patterns:
      - "security"
      - "scan"
      - "vulnerability"
      - "vuln"
      - "CVE"
      - "DAST"
      - "penetration test"
      - "pen test"
    modes_unlocked:
      - scan
      - dast
      - binary-scan
      - mitigate
      - comply
      - netcompat
      - dashboard
    unlock_message: |
      Security pack unlocked! You now have access to:
      • scan — org-wide security scans
      • dast — web application security testing
      • binary-scan — analyze executables
      • mitigate — fix security findings
      • comply — SOC 2, NIST, audit evidence
      • netcompat — Zscaler compatibility checks
      • dashboard — security reporting

  # Domains pack (game-dev) — unlocks when user mentions game development
  - pack: domains
    mode: game-dev
    patterns:
      - "game"
      - "unity"
      - "godot"
      - "game dev"
      - "gamedev"
      - "game build"
      - "game qa"
    modes_unlocked:
      - game-dev
    unlock_message: |
      Game development mode unlocked!
      • game-dev — game build, review, QA workflows

  # Domains pack (client-work) — unlocks when user mentions Power BI, client work
  - pack: domains
    mode: client-work
    patterns:
      - "power bi"
      - "powerbi"
      - "power apps"
      - "powerapps"
      - "client work"
      - "sow"
      - "intake"
      - "dax"
      - "power automate"
    modes_unlocked:
      - client-work
    unlock_message: |
      Client work mode unlocked!
      • client-work — Power BI, Power Apps, intake, SOW, DAX optimization

  # Domains pack (saas-build) — unlocks when user mentions API, SaaS features
