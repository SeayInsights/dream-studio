version: 1.0

avoid:
  - id: spec-before-constitution
    severity: critical
    discovered: 2026-04-29
    title: "Never write a spec without reading CONSTITUTION.md first"
    context: "A spec that contradicts existing architectural decisions creates conflict at build time — the implementer has two sources of truth. If the project has .planning/CONSTITUTION.md, it must be read before writing any spec."
    fix: "Step 1 (Clarify): if .planning/CONSTITUTION.md exists, read it. Surface any conflicts in the spec before recommending an approach."

  - id: single-approach-spec
    severity: high
    discovered: 2026-04-29
    title: "Never write a spec with only one approach"
    context: "A single-approach spec is a decision disguised as exploration. The Director has no real choice to make, and alternative approaches that might be better never surface."
    fix: "Always explore 2-3 approaches with honest trade-offs. The recommendation is one of them — not the only one."

  - id: code-before-approval
    severity: critical
    discovered: 2026-04-29
    title: "Never write or imply code before the spec is explicitly approved"
    context: "Starting implementation before approval wastes work if the approach changes. The approval gate exists to prevent this."
    fix: "End every think with: spec document path + 'Waiting for Director approval before plan.' No code, no plan, no implementation hints."

  - id: spec-without-risk-check
    severity: high
    discovered: 2026-05-01
    title: "Run spec_risk_check.py before writing Edge Cases"
    context: "Specs written without checking prior session history and gotchas repeat known mistakes. The risk check surfaces relevant prior experience that should inform the spec's edge cases and assumptions."
    fix: "Before step 4 (Spec), run: py scripts/spec_risk_check.py <topic>. Incorporate relevant gotchas and prior session context into the Edge Cases and Assumptions sections."

  - id: research-without-triangulation
    severity: high
    discovered: 2026-05-01
    title: "Never state a research finding without triangulation"
    context: "Per domains/research/analysis.yml, findings require 3+ independent sources before they can be stated with confidence. Single-source findings are hypotheses, not conclusions."
    fix: "Run py scripts/source_ranker.py on collected sources. If triangulation score < 1.0, collect more independent sources. If confidence remains LOW after reasonable effort, explicitly label the finding as 'unverified' in the spec."

  - id: research-without-counter-argument
    severity: medium
    discovered: 2026-05-01
    title: "Always steel-man the opposing view before finalizing a conclusion"
    context: "Per domains/research/analysis.yml, conclusions without a counter-argument are unreliable. If all sources agree and no dissent is found, the research may be exhibiting confirmation bias."
    fix: "Before finalizing the recommended approach in step 3 (Recommend), articulate the strongest possible counter-argument. If it cannot be refuted with available evidence, downgrade the conclusion to 'tentative' or 'contested' and note this in the spec."

best_practices:
  - id: p1-p2-p3-by-value
    title: "Prioritize user stories P1/P2/P3 by user value, not implementation complexity"
    context: "P1 = what the user can't live without. Prioritizing by 'what's easiest to build first' produces an MVP that solves the wrong problem."

  - id: measurable-success-criteria
    title: "Success criteria must be measurable and binary (pass/fail)"
    context: "'System feels fast' is not a success criterion. 'P99 latency < 200ms on the golden path' is."

edge_cases:
  - id: research-mode
    title: "For research: tasks, output a recommendation + 2-3 sources — not a full spec"
    context: "Research tasks (market analysis, tech comparison) don't need the full spec format. Output: question answered + recommendation + evidence."

limitations:
  - id: spec-not-architecture
    title: "Think produces a spec, not an architecture diagram"
    context: "For system-level architecture, use the think spec to capture the decision, then link to a separate architecture doc. SKILL.md has a spec template, not an architecture template."

deprecated: []
