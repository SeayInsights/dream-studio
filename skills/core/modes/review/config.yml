# Thresholds
thresholds:
  max_tasks_before_checkpoint: 3
  checkpoint_interval_minutes: 30

# Model defaults
models:
  default: sonnet
  fast_mode: haiku

# Behavior flags
behavior:
  allow_parallel_execution: true
  strict_mode: false

# Performance budgets
budgets:
  max_tokens: 150000
  max_time_seconds: 600
  max_context_percent: 80
