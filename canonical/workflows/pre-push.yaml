name: pre-push
description: >
  Pre-push gates that block `git push` on regressions in formatting, lint
  baseline, source-skill integrity, evals, and contract atlas leakage.
  Advisory gates surface hygiene signals without blocking push.
  Invoked by hooks/git/pre-push.
version: 2
on_failure: stop

# Gate tiers (AD-3 two-tier model):
#   tier: blocking  — gate failure blocks push (default)
#   tier: advisory  — gate failure surfaces a warning but does not block push
#
# Classification rule: correctness / safety / authority-integrity → blocking
#                      hygiene / drift / informational              → advisory
#
# Each gate is run via subprocess by core/gates/pre_push.py.
# Exit code 0 = pass, non-zero = fail. cwd is the repo root.
# Order matters — cheapest gates first so a failure halts the slow ones.
gates:
  - id: format-check
    tier: blocking
    description: >
      `py -m black --check .` must report zero would-reformat files. Prevents
      the recurring formatting-CI failure that broke PRs #23-#27.
    command: [py, -m, black, --check, .]
    fail_hint: "Run `py -m black .` to fix formatting, then re-push."

  - id: lint-check
    tier: blocking
    description: >
      The flake8 baseline must show status=pass with no new findings beyond the
      pinned baseline file.
    command: [py, interfaces/cli/lint_baseline.py, check]
    fail_hint: "Fix new lint findings; do not bypass the baseline."

  - id: skill-sync
    tier: blocking
    description: >
      Source-level enforcement-block regression check (A4/A5 invariant) — the
      `_ENFORCEMENT_BLOCK` constant must contain zero `py -m interfaces.cli.ds`
      references.
    command: [py, -m, core.gates.skill_sync_source]
    fail_hint: >
      The compiler enforcement block has regressed back to CLI references.
      Restore the function-call form per A4/A5.

  - id: test-suite
    tier: blocking
    description: >
      Targeted eval suite (tests/evals/) must pass. Scoped to evals (not the
      full test suite) to stay OOM-safe per the established testing policy.
    command: [py, -m, pytest, tests/evals, -q]
    fail_hint: "Eval failures block push — fix the failing eval before retry."

  - id: atlas-leak
    tier: blocking
    description: >
      Contract atlas lifecycle gate. Detects PRD/contract leakage into
      unauthorized projection surfaces. Authority-integrity check — blocking.
    command: [py, interfaces/cli/contract_atlas_lifecycle_gate.py]
    fail_hint: "Atlas leak — see contract-atlas docs for resolution."

  - id: docs-drift
    tier: blocking
    description: >
      Contract docs drift gate. Detects when docs and code references have
      drifted apart. Blocking — CI runs the identical script as a blocking
      step, and the advisory local tier let PR #263 push green and then fail
      all three platforms on the same drift (WO-GATE-PARITY). Uses
      DREAM_STUDIO_BASE_REF=origin/main to match CI behavior.
    command: [py, interfaces/cli/contract_docs_drift_gate.py]
    env:
      DREAM_STUDIO_BASE_REF: origin/main
    fail_hint: >
      Docs drift detected — CI's Contract docs drift step will fail on the
      same change set. Update the required_doc_refs listed in the gate JSON
      (e.g. docs/DATABASE.md, docs/MIGRATION_AUTHORITY.md) in this change set.

  - id: migration-risk
    tier: blocking
    description: >
      Migration risk classifier. Detects SQL/migration-file changes and
      requires explicit matrix-watch confirmation before merge. Migration
      changes have historically passed local tests but failed on macOS/Windows
      in the remote 3-platform matrix. Skip with
      MIGRATION_RISK_ACKNOWLEDGED=1 git push after confirming matrix is running.
    command: [py, -m, core.gates.migration_risk]
    fail_hint: >
      SQL/migration files changed. Run `gh pr checks <N> --watch` and confirm
      all three platforms (ubuntu, macos, windows) are green before merging.
      To bypass: MIGRATION_RISK_ACKNOWLEDGED=1 git push

  - id: authority-boundary
    tier: advisory
    description: >
      DuckDB authority boundary gate. Detects connect_analytics(read_only=False)
      calls outside core/projections/runner.py — the sole authorised write
      connection holder. Hygiene gate — advisory so it never blocks a push,
      but violations should be resolved before WO-TS3 lands.
    command: [py, -m, core.gates.authority_boundary_check]
    warn_hint: "DuckDB write connection outside runner.py — see authority boundary docs."

  - id: rule1-adapters-no-authority
    tier: blocking
    description: >
      Dependency rule 1: runtime/hooks/ must not write directly to authority tables
      (business_*, raw_*, reg_*, canonical_events). Hooks must emit events via spool
      only. Any direct SQL write from the adapter layer is a boundary violation.
    command: [py, -m, core.gates.dependency_rules, rule1]
    fail_hint: "Rule 1 violation — runtime/hooks/ wrote to an authority table. Route through spool/emitters instead."

  - id: rule2-projections-readonly
    tier: blocking
    description: >
      Dependency rule 2: projections/ modules must be read-only. No INSERT, UPDATE,
      or DELETE against canonical authority tables (business_*, raw_*, reg_*,
      canonical_events) from projections/api/ or projections/core/ (tests excluded).
    command: [py, -m, core.gates.dependency_rules, rule2]
    fail_hint: "Rule 2 violation — a projection module wrote to an authority table. Move the write to the CLI or ingestor layer."

  - id: rule3-cli-business-state-writer
    tier: advisory
    description: >
      Dependency rule 3 (advisory): API route handlers in projections/api/routes/
      must not write directly to business_* tables. The CLI/work-order layer is the
      designated writer for business state. Warning tier only until false-positive rate
      is confirmed low.
    command: [py, -m, core.gates.dependency_rules, rule3]
    warn_hint: "Rule 3 advisory — a route handler wrote to business_* directly. Consider routing through the CLI/work-order layer."

  - id: rubric-immutability
    tier: blocking
    description: >
      eval-rubric.yml write-protection gate. Any change to
      canonical/skills/domains/eval-rubric.yml requires the [rubric-update]
      token in at least one commit message. Writes a guardrail_decisions row
      (reason=rubric-immutability-constraint) for audit regardless of outcome.
    command: [py, -m, core.gates.rubric_immutability_gate]
    fail_hint: >
      eval-rubric.yml was modified without the [rubric-update] commit token.
      Add [rubric-update] to your commit message and re-push.

  - id: rule4-ingestor-sole-event-writer
    tier: blocking
    description: >
      Dependency rule 4: no module outside the ingestor path may INSERT INTO
      canonical_events (the compat VIEW alias). The ingestor writes to
      business_canonical_events and ai_canonical_events directly. Any direct
      INSERT to the canonical_events VIEW name is an authority boundary violation.
    command: [py, -m, core.gates.dependency_rules, rule4]
    fail_hint: "Rule 4 violation — INSERT INTO canonical_events found outside spool/ingestor.py. Use the spool/emitter path instead."
