name: prototype
description: Fast prototype — think then build, skip formal review. For game jams and quick experiments.
version: 2
on_failure: abort

gates:
  director-approval:
    type: pause
    prompt: "Approve prototype scope?"

nodes:
  - id: think
    skill: think
    gate: director-approval
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: build
    skill: build
    depends_on: [think]
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15
    input: "{{think.output}}"

  - id: verify
    skill: verify
    depends_on: [build]
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15

  - id: snapshot
    depends_on: [verify]
    command: |
      Produce a "what exists now" snapshot:
        - What was prototyped (one-paragraph description)
        - Entry point: how to run it (command, file to open, URL, etc.)
        - Key files created and their purpose (bulleted list with paths)
        - Known limitations or rough edges (this is a prototype — be honest)
        - Suggested next steps if this prototype is worth pursuing further

      PERSISTENT STORAGE:
      Derive the project slug from the cwd basename, lowercased with spaces replaced by hyphens.
      Get today's date as YYYY-MM-DD.
      Save this snapshot to:
        ~/.dream-studio/state/prototype-<project-slug>-<YYYY-MM-DD>.md
      Create the directory if it does not exist (mkdir -p).
      Print the saved path and the "how to run it" line clearly — the user should be able to pick this up after closing the session.
    model: haiku
    context: fresh
    timeout_seconds: 120
