      summary: "Delete the commented-out code. Git history preserves it. Dead code confuses readers who can't tell if it was intentional removal or a mistake."
      guide_ref: "canonical/skills/quality/references/code-writing-best-practices.md#e-comments--documentation"

    suppressions:
