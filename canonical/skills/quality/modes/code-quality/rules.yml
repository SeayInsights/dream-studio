  - id: "cq-021"
    name: "No side effects from getters or @property methods"
    severity: critical
    category: functions

    source:
      list: "LIST-4"
      section: "B"
      item: "No side effects from getters"

    regulatory_anchors: []

    detection:
      type: hybrid
      static:
        tool: null
        fallback_to_llm: true
        notes: "AST: detect @property methods that contain mutations (self.x = ..., list.append, dict update, etc.). Also detect functions named get_*/fetch_*/read_* that mutate state."
      llm:
        prompt_template: null
        context_scope: function
        estimated_tokens: 450

    triggers:
      - "@property method that mutates instance state (self.x = ... or similar)"
      - "Function named get_X or fetch_X that has observable side effects beyond reading"

    remediation:
      summary: "Getter methods must be pure reads. Side effects in getters break the principle of least surprise — callers assume reading is safe. Use a separate setter/method for mutations."
      guide_ref: "canonical/skills/quality/references/code-writing-best-practices.md#b-functions"

    suppressions:
      - inline_comment: "# cq-021-suppress"
        reason: "Lazy initialization pattern — side effect is creation on first access, intentional"

    applies_to:
      languages: [python, typescript, javascript]
      file_types: [".py", ".ts", ".js"]

    action:
      audit_mode: report
      build_mode: block

