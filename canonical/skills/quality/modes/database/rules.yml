# Database Rules
# Version: 1.0.0 (18.4.2 initial)
# Schema version: 1
#
# Source authority:
#   LIST-3 = canonical/skills/quality/references/database-best-practices.md (sections A-M)
#
# Skill boundary with ds-quality:security:
#   Security owns: parameterized queries (sec-002, inject risk), encryption at rest (sec-009),
#     encryption in transit (sec-010), PII in runtime logs (sec-013), backup encryption (sec-023 future)
#   Database owns: schema design, query patterns, migration safety, backup strategy/ops
#   Cross-references: db-009 ↔ sec-002; db-020 ↔ sec-013; db-016/017/018 ↔ sec-023
#
# Sections J (multi-tenancy) and K (compliance) deferred:
#   J → future when Dream Studio has multi-tenant scope
#   K → 18.7.1 db-compliance skill
#
# Rules with action.build_mode: null are audit-only (require file-level or ops context)
#
# Schema extension note (18.4.2):
#   This skill introduces 'config_section' as a new detection.llm.context_scope value
#   beyond what ds-quality:security uses. It extracts the relevant config block from
#   config files (connection pool settings, WAL mode, backup config) rather than
#   the full file. Other skills may adopt this value; it is an upward-compatible
#   extension to the shared rules schema.

rules:

  - id: "db-001"
    name: "Primary key on every table"
    severity: high
    category: schema

    source:
      list: "LIST-3"
      section: "D"
      item: "Primary keys on every table"

    regulatory_anchors: []

    detection:
      type: static
      static:
        tool: sqlparse
        config: null
        fallback_to_llm: true
        notes: "Parse CREATE TABLE statements in .sql migration files; flag tables missing PRIMARY KEY or equivalent (INTEGER PRIMARY KEY, TEXT PRIMARY KEY)."
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 400

    triggers:
      - "CREATE TABLE statement with no PRIMARY KEY constraint or column-level PRIMARY KEY"
      - "Table definition using only NOT NULL without designating a unique identity column"

    remediation:
      summary: "Add PRIMARY KEY to every table. Use INTEGER PRIMARY KEY (SQLite rowid alias) for auto-incrementing integer PKs, or TEXT PRIMARY KEY for UUID-based PKs."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#d-schema-integrity--correctness"

    suppressions:
      - path_glob: "tests/fixtures/**"
        reason: "Test fixture tables may omit PK for brevity"
      - inline_comment: "# db-001-suppress"
        reason: "Explicit operator acknowledgment — document why this table has no PK"
      - name_pattern: ".*(_bak|_backup|_temp|_old|_copy)[0-9]*$"
        reason: "Migration backup/temp tables (CREATE TABLE x_bak AS SELECT) inherit PK from source; standard SQLite table-reconstruction pattern. NOTE: if a business table uses _bak/_temp naming, this suppression silently misses a real missing-PK violation. Avoid those suffixes for business tables."

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal SQL concept. PRIMARY KEY syntax is identical across SQLite, Postgres, and MySQL. Detection reads migration files (*.sql) or ORM schema files."

    action:
      audit_mode: report
      build_mode: block

  - id: "db-002"
    name: "Foreign keys with explicit ON DELETE behavior"
    severity: high
    category: schema

    source:
      list: "LIST-3"
      section: "D"
      item: "Foreign keys with ON DELETE behavior chosen deliberately (cascade vs. restrict vs. null)"

    regulatory_anchors: []

    detection:
      type: static
      static:
        tool: sqlparse
        fallback_to_llm: true
        notes: "Detect FK constraints missing ON DELETE clause. Also flag REFERENCES without ON DELETE."
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 500

    triggers:
      - "REFERENCES clause without an ON DELETE or ON UPDATE action"
      - "FK column that could cause orphaned rows or silent cascades"

    remediation:
      summary: "Choose ON DELETE behavior deliberately: CASCADE (child rows deleted with parent), RESTRICT (block deletion if child exists), SET NULL (child FK set to NULL), or NO ACTION. Document the choice in a migration comment."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#d-schema-integrity--correctness"

    suppressions:
      - inline_comment: "# db-002-suppress"
        reason: "Explicit operator acknowledgment"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal SQL concept. FOREIGN KEY / REFERENCES syntax is identical across SQLite, Postgres, and MySQL. Detection reads migration files (*.sql) or ORM schema files."

    action:
      audit_mode: report
      build_mode: warn

  - id: "db-003"
    name: "NOT NULL constraints where appropriate"
    severity: medium
    category: schema

    source:
      list: "LIST-3"
      section: "D"
      item: "NOT NULL constraints where appropriate"

    regulatory_anchors: []

    detection:
      type: llm
      static:
        tool: null
        fallback_to_llm: true
        notes: "LLM semantic check: identify columns that logically should never be NULL but lack NOT NULL constraint."
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 600

    triggers:
      - "Column that semantically cannot be NULL (e.g., created_at, status, user_id) missing NOT NULL"
      - "Surrogate key column nullable when it's always set at insert time"

    remediation:
      summary: "Add NOT NULL to columns that logically cannot be null. If NULL is intentional (optional FK, optional metadata), document it with a comment."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#d-schema-integrity--correctness"

    suppressions:
      - inline_comment: "# db-003-suppress"
        reason: "NULL is intentional here — operator has documented rationale"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal SQL concept. NOT NULL constraint syntax is identical across SQLite, Postgres, and MySQL. Detection reads migration files (*.sql) or ORM schema files."

    action:
      audit_mode: report
      build_mode: warn

  - id: "db-004"
    name: "CHECK constraints for status/enum columns"
    severity: medium
    category: schema

    source:
      list: "LIST-3"
      section: "D"
      item: "CHECK constraints for invariants (status enums, ranges)"

    regulatory_anchors: []

    detection:
      type: llm
      static:
        tool: sqlparse
        fallback_to_llm: true
        notes: |
          Detect columns named status, state, type, tier, category, role that use TEXT/VARCHAR without a CHECK constraint constraining allowed values.
          Detection reads migration files for columns named status, state, type, role without CHECK IN (...).
          Universal: CHECK constraint syntax identical across SQLite, Postgres, MySQL.
          Note: Postgres ENUM type is an alternative to CHECK — flag CHECK absence but accept ENUM as equivalent.
          D1/SQLite: CHECK constraint is the standard approach.
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 500

    triggers:
      - "Column named status, state, type, or role is TEXT without CHECK IN (...) constraint"
      - "Application logic enforces enum values but DB schema has no constraint"

    remediation:
      summary: "Add CHECK constraint: status TEXT CHECK(status IN ('active','inactive','deleted')). Alternatively, use a foreign key to a lookup table. In Postgres, a native ENUM type is an acceptable equivalent."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#d-schema-integrity--correctness"

    suppressions:
      - inline_comment: "# db-004-suppress"
        reason: "Open enum — new values added programmatically; CHECK would require migration on each extension"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal SQL concept. CHECK constraint syntax is identical across SQLite, Postgres, and MySQL. Postgres ENUM is accepted as equivalent to CHECK IN (...)."

    action:
      audit_mode: report
      build_mode: warn

  - id: "db-005"
    name: "Money stored as integer cents or NUMERIC, never REAL/FLOAT"
    severity: critical
    category: schema

    source:
      list: "LIST-3"
      section: "D"
      item: "Always store money as integer cents or numeric/decimal, never float"

    regulatory_anchors: []

    detection:
      type: hybrid
      static:
        tool: semgrep
        fallback_to_llm: true
        availability_note: "semgrep not installed in Dream Studio environment; this rule executes via LLM fallback. Install semgrep for cheaper static execution: pattern `(REAL|FLOAT|DOUBLE)` near financial field names."
        notes: "Preferred static: semgrep regex on REAL/FLOAT/DOUBLE near financial field names. Current state: LLM fallback active (semgrep unavailable)."
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 400

    triggers:
      - "Column named amount, price, cost, fee, payment, balance, total, revenue, tax, or charge uses REAL, FLOAT, or DOUBLE type"
      - "Python code using float() for monetary calculations where integer cents are appropriate"

    remediation:
      summary: "Store money as INTEGER (cents/smallest currency unit) or NUMERIC/DECIMAL with explicit precision. Never REAL or FLOAT — floating-point arithmetic causes silent rounding errors in financial calculations."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#d-schema-integrity--correctness"

    suppressions:
      - inline_comment: "# db-005-suppress"
        reason: "Float is intentional here — not a monetary value despite the column name"

    applies_to:
      languages: [sql, python, typescript, javascript]
      file_types: [".sql", ".py", ".ts", ".js"]

    action:
      audit_mode: report
      build_mode: block

  - id: "db-006"
    name: "Timestamps stored as UTC with timezone convention"
    severity: high
    category: schema

    source:
      list: "LIST-3"
      section: "D"
      item: "Always store timestamps as UTC with timezone; convert at the edge"

    regulatory_anchors: []

    detection:
      type: static
      static:
        tool: sqlparse
        fallback_to_llm: true
        notes: |
          Detect timestamp columns using TEXT (common in SQLite) without an explicit UTC convention comment or application-enforced UTC policy. Also detect TIMESTAMP WITHOUT TIME ZONE in Postgres.
          Engine-specific UTC enforcement:
          - SQLite/D1: TEXT columns with DEFAULT (strftime('%Y-%m-%dT%H:%M:%SZ','now')) or INTEGER epoch
          - Postgres: TIMESTAMPTZ (WITH TIME ZONE) is the preferred type
          - MySQL: DATETIME with application-level UTC enforcement (MySQL doesn't enforce timezone at column level)
          Flag: TEXT timestamps without UTC convention comment; TIMESTAMP WITHOUT TIME ZONE in Postgres
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 500

    triggers:
      - "Timestamp column type has no UTC enforcement (TEXT without documented policy, TIMESTAMP without time zone in Postgres)"
      - "datetime.now() used instead of datetime.now(timezone.utc) or datetime.utcnow()"

    remediation:
      summary: "Store timestamps as UTC. In SQLite: use TEXT ISO-8601 with Z suffix convention and enforce in application code. In Postgres: use TIMESTAMPTZ. In Python: always use datetime.now(timezone.utc), never datetime.now() or datetime.utcnow()."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#d-schema-integrity--correctness"

    suppressions:
      - inline_comment: "# db-006-suppress"
        reason: "Local time is intentional here — UTC convention documented elsewhere"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal concept. Engine-specific UTC enforcement varies: SQLite/D1 use TEXT with strftime, Postgres uses TIMESTAMPTZ, MySQL requires application-level enforcement."

    action:
      audit_mode: report
      build_mode: warn

  - id: "db-007"
    name: "Index on every foreign key column"
    severity: high
    category: query

    source:
      list: "LIST-3"
      section: "E"
      item: "Indexes on every foreign key"

    regulatory_anchors: []

    detection:
      type: static
      static:
        tool: sqlparse
        fallback_to_llm: true
        notes: "Parse migration files: identify FK columns and check for corresponding CREATE INDEX. Match by column name across CREATE TABLE and CREATE INDEX statements."
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 600

    triggers:
      - "Column with REFERENCES constraint has no corresponding CREATE INDEX"
      - "FK column participates in JOIN queries but no index exists"

    remediation:
      summary: "Add CREATE INDEX idx_<table>_<column> ON <table>(<column>) for every FK column. Missing FK indexes cause table scans on join operations."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#e-query--performance"

    suppressions:
      - inline_comment: "# db-007-suppress"
        reason: "Table is read-rarely; full scan acceptable; FK index not worth the write overhead"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal SQL concept. CREATE INDEX syntax is identical across SQLite, Postgres, and MySQL. Detection reads migration files (*.sql) or ORM schema files."

    action:
      audit_mode: report
      build_mode: warn

  - id: "db-008"
    name: "Indexes on high-selectivity WHERE/ORDER BY/JOIN columns"
    severity: medium
    category: query

    source:
      list: "LIST-3"
      section: "E"
      item: "Indexes on every column used in WHERE, ORDER BY, JOIN"

    regulatory_anchors: []

    detection:
      type: llm
      static:
        tool: null
        fallback_to_llm: true
        notes: "LLM semantic: identify hot query paths in Python application code and verify corresponding indexes exist in migration files."
      llm:
        prompt_template: null
        context_scope: function
        estimated_tokens: 700

    triggers:
      - "WHERE clause on a column with no index, in a query on a table with expected high row count"
      - "ORDER BY on an unindexed column in a list endpoint"

    remediation:
      summary: "Add indexes for columns used in WHERE, ORDER BY, and JOIN in frequent queries. Use EXPLAIN ANALYZE to verify the index is used. Composite indexes should list the most selective column first."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#e-query--performance"

    suppressions:
      - inline_comment: "# db-008-suppress"
        reason: "Table expected to stay small; full scan acceptable"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal concept. Hot query paths exist in all languages. Detection correlates application query patterns with migration index definitions."

    action:
      audit_mode: report
      build_mode: null

  - id: "db-009"
    name: "No string-formatted SQL (query design angle)"
    severity: high
    category: query

    source:
      list: "LIST-3"
      section: "E"
      item: "Parameterized queries / prepared statements (never string concatenation — SQLi vector)"

    regulatory_anchors: []

    detection:
      type: hybrid
      static:
        tool: semgrep
        fallback_to_llm: true
        availability_note: "semgrep not installed in Dream Studio environment; this rule executes via LLM fallback. Install semgrep for cheaper static execution: pattern for f-string + SQL keyword combination."
        notes: |
          Preferred static: semgrep on f-string SQL patterns. Current state: LLM fallback active. Cross-reference with sec-002 (injection risk angle): this rule fires on the design anti-pattern; sec-002 fires on the injection risk. Both may fire on the same code.
          CROSS-REFERENCE: db-009 owns the QUERY DESIGN angle (f-string SQL is a structural anti-pattern).
          sec-002 (ds-quality:security) owns the INJECTION RISK angle (exploit surface, severity: critical).
          Both rules may fire on the same code. db-009 is medium severity (design smell);
          sec-002 is critical (security risk). Reports note the sibling rule.
          Do NOT suppress db-009 because sec-002 fired — both angles matter.
      llm:
        prompt_template: null
        context_scope: function
        estimated_tokens: 400

    triggers:
      - "f-string used to construct SQL query (f'SELECT ... {user_input}')"
      - "% string formatting with SQL keywords (cursor.execute('SELECT * FROM t WHERE x=%s' % val))"
      - "string concatenation to build SQL: 'SELECT * FROM t WHERE ' + condition"
      - "Template literal used to construct SQL query in TypeScript/JavaScript"
      - "fmt.Sprintf() used to construct SQL in Go"

    remediation:
      summary: "Use parameterized queries: cursor.execute('SELECT * FROM t WHERE x = ?', (val,)) or SQLAlchemy bound parameters. F-string SQL is both an injection risk (see sec-002) and a code quality anti-pattern — string construction makes queries hard to cache, trace, and safely modify."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#e-query--performance"

    cross_references:
      - rule_id: "sec-002"
        skill: "ds-quality:security"
        reason: "sec-002 fires on the same f-string SQL from the injection-risk angle; db-009 fires from the design-quality angle. Both may fire on the same line. Security catches the exploit; database catches the anti-pattern."
        surface_co_located: true

    suppressions:
      - path_glob: "tests/**"
        reason: "Test fixtures may use string SQL for brevity — verify no user input reaches these"
      - inline_comment: "# db-009-suppress"
        reason: "Explicit operator acknowledgment — values are hardcoded constants, not user input"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal anti-pattern. Applies across all languages with SQL access. Detection looks for string interpolation/concatenation in query construction."

    action:
      audit_mode: report
      build_mode: block

  - id: "db-010"
    name: "Schema in version control — migration files, not GUI changes"
    severity: high
    category: migration

    source:
      list: "LIST-3"
      section: "D"
      item: "Schema in version control (migration files, not GUI changes)"

    regulatory_anchors: []

    detection:
      type: static
      static:
        tool: null
        fallback_to_llm: true
        notes: "Check for existence of a migrations directory with numbered .sql files. Flag if schema changes appear in application code (CREATE TABLE in non-migration .py files outside of test fixtures)."
      llm:
        prompt_template: null
        context_scope: function
        estimated_tokens: 400

    triggers:
      - "CREATE TABLE or ALTER TABLE in .py files outside of migration runner or test fixtures"
      - "No migrations directory found with versioned .sql files"

    remediation:
      summary: "All schema changes must go through versioned migration files. Never alter schema via DB GUI or ad-hoc scripts. Dream Studio uses core/event_store/migrations/*.sql — follow this pattern."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#d-schema-integrity--correctness"

    suppressions:
      - path_glob: "tests/**"
        reason: "Test fixtures may create in-memory tables for isolation"
      - inline_comment: "# db-010-suppress"
        reason: "Intentional — migration runner bootstrap code"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".py", ".sql", ".ts", ".js", ".go", ".rs"]
      note: "Universal concept. Schema should always be in version-controlled migration files, not ad-hoc scripts, regardless of language or database backend."

    action:
      audit_mode: report
      build_mode: warn

  - id: "db-011"
    name: "Migrations are additive and reversible — no silent column drops"
    severity: high
    category: migration

    source:
      list: "LIST-3"
      section: "D"
      item: "Migrations are forward-only, reversible, and tested"

    regulatory_anchors: []

    detection:
      type: llm
      static:
        tool: sqlparse
        fallback_to_llm: true
        notes: "Detect DROP TABLE, DROP COLUMN, or TRUNCATE in migration files without an explicit deprecation comment. Also flag RENAME COLUMN (requires data migration to be safe)."
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 600

    triggers:
      - "DROP TABLE or DROP COLUMN in a migration without a preceding deprecation migration"
      - "RENAME TABLE or RENAME COLUMN without a corresponding data copy step"
      - "Migration that changes column type without ensuring data compatibility"

    remediation:
      summary: "Follow expand-contract for destructive migrations: (1) add new column, (2) migrate data in a separate step or via application dual-write, (3) remove old column in a later migration after confirming no live references. Never drop columns in the same migration that stops using them."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#d-schema-integrity--correctness"

    suppressions:
      - inline_comment: "# db-011-suppress"
        reason: "Destructive migration approved — pre-conditions verified (no live references, backup taken)"
      - pattern: "DROP TABLE .*(bak|temp|_old|_copy)[0-9]*"
        reason: "Dropping migration backup/temp table (created in same migration as part of table-reconstruction pattern). Narrow pattern — only matches explicit _bak/_temp suffixes."
      # context_pattern for "CREATE TABLE ... AS SELECT" was removed: too broad, could mask real DROP issues.
      # Follow-up: add inline # db-011-suppress comments to affected migrations (022, 071) instead.

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal concept. Expand-contract migration pattern applies regardless of database backend. Detection reads migration files for destructive DDL operations."

    action:
      audit_mode: report
      build_mode: block

  - id: "db-012"
    name: "Connection pool configured with limits and timeout"
    severity: medium
    category: query

    source:
      list: "LIST-3"
      section: "E"
      item: "Connection pooling (PgBouncer, RDS Proxy, app-side pool)"

    regulatory_anchors: []

    detection:
      type: llm
      static:
        tool: null
        fallback_to_llm: true
        notes: |
          Detect SQLAlchemy create_engine() calls without pool_size, max_overflow, pool_timeout parameters. Also detect direct sqlite3.connect() in hot paths without connection reuse.
          ENGINE-SPECIFIC DETECTION:
          - Python + SQLAlchemy + Postgres/MySQL: flag create_engine() without pool_size, max_overflow, pool_timeout
          - Python + SQLite: no pool needed (file-based); check for per-request sqlite3.connect() in hot paths
          - D1/Cloudflare: managed connection pool — no configuration needed, skip this check
          - Node/TypeScript + pg/mysql2: check for pool configuration in connection options
          - Node/TypeScript + Prisma: PrismaClient has connection_limit; flag if not configured for production
      llm:
        prompt_template: null
        context_scope: function
        estimated_tokens: 500

    triggers:
      - "SQLAlchemy create_engine() without pool_size or pool_timeout"
      - "Database connection created per-request without pooling in a web server context"
      - "Node.js pg Pool created without explicit max/idleTimeoutMillis configuration"
      - "Prisma PrismaClient instantiated per-request in a serverless or web context"

    remediation:
      summary: "Configure connection pool: pool_size (default connections), max_overflow (burst connections), pool_timeout (wait time before error), pool_recycle (reconnect interval). For SQLite: use a singleton connection or connection pool manager; avoid per-request sqlite3.connect(). D1 and managed cloud databases handle pooling automatically."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#e-query--performance"

    suppressions:
      - inline_comment: "# db-012-suppress"
        reason: "Single-process app with controlled concurrency; default pool acceptable"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".py", ".ts", ".js", ".go", ".rs"]
      note: "Engine-specific detection. D1/managed databases skip this check. Detection branches on detected database type from stack detector."

    action:
      audit_mode: report
      build_mode: null

  - id: "db-013"
    name: "Query statement timeout configured"
    severity: medium
    category: query

    source:
      list: "LIST-3"
      section: "E"
      item: "Query timeout / statement timeout configured (don't let one query hang the DB)"

    regulatory_anchors: []

    detection:
      type: static
      static:
        tool: null
        fallback_to_llm: true
        notes: |
          Detect absence of statement_timeout in Postgres config/connection, or absence of timeout= parameter in sqlite3.connect() calls in long-running query paths.
          ENGINE-SPECIFIC DETECTION:
          - SQLite: `sqlite3.connect(db, timeout=30.0)` — timeout parameter controls statement timeout
          - Postgres: `SET statement_timeout = '30s'` in connection setup OR in postgresql.conf
          - MySQL: `SET SESSION max_execution_time = 30000` (milliseconds)
          - D1/Cloudflare: managed — statement timeouts handled by platform, skip check
          - Node/TypeScript + pg: `{ query_timeout: 30000 }` in pool config
          Flag if relevant pattern is absent for the detected database type.
      llm:
        prompt_template: null
        context_scope: config_section
        estimated_tokens: 400

    triggers:
      - "Postgres connection without SET statement_timeout"
      - "Long-running query function with no timeout guard"
      - "sqlite3.connect() call without timeout= parameter in a long-running query path"
      - "MySQL connection without SET SESSION max_execution_time"

    remediation:
      summary: "Set statement timeouts per connection or per query: Postgres: SET statement_timeout = '30s'; SQLite: sqlite3.connect(db, timeout=30.0); MySQL: SET SESSION max_execution_time = 30000. D1 manages timeouts automatically. Unbounded queries can exhaust connection pool and block the application."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#e-query--performance"

    suppressions:
      - inline_comment: "# db-013-suppress"
        reason: "Known long-running query — timeout handled at infrastructure level"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".py", ".sql", ".ts", ".js", ".go", ".rs", ".cfg", ".ini", ".env"]
      note: "Engine-specific detection. D1/managed databases skip this check. Detection branches on detected database type from stack detector."

    action:
      audit_mode: report
      build_mode: null

  - id: "db-014"
    name: "Cursor/keyset pagination, not OFFSET for large tables"
    severity: medium
    category: query

    source:
      list: "LIST-3"
      section: "E"
      item: "Pagination via cursors/keysets, not OFFSET on large tables"

    regulatory_anchors: []

    detection:
      type: llm
      static:
        tool: sqlparse
        fallback_to_llm: true
        notes: "Detect OFFSET in SQL queries, especially in list endpoints. Flag as medium unless the table is known to be small."
      llm:
        prompt_template: null
        context_scope: function
        estimated_tokens: 500

    triggers:
      - "LIMIT ? OFFSET ? pattern in a query on a table expected to grow large"
      - "Page-based pagination using OFFSET in an API endpoint"

    remediation:
      summary: "Replace OFFSET pagination with keyset/cursor pagination: WHERE id > last_seen_id ORDER BY id LIMIT N. OFFSET scans grow linearly with page depth — page 1000 requires scanning 1000×N rows before returning results."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#e-query--performance"

    suppressions:
      - inline_comment: "# db-014-suppress"
        reason: "Table bounded by design; OFFSET pagination acceptable at this scale"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal concept. OFFSET pagination degrades on any SQL engine. Detection looks for LIMIT/OFFSET patterns in query code across all languages."

    action:
      audit_mode: report
      build_mode: null

  - id: "db-015"
    name: "No N+1 query patterns in hot paths"
    severity: high
    category: query

    source:
      list: "LIST-3"
      section: "E"
      item: "Avoid N+1 queries — measure with APM"

    regulatory_anchors: []

    detection:
      type: llm
      static:
        tool: null
        fallback_to_llm: true
        notes: "LLM semantic: detect loop + query pattern where a query is executed inside a for/while loop with a loop variable used as the query predicate."
      llm:
        prompt_template: null
        context_scope: function
        estimated_tokens: 700

    triggers:
      - "for item in items: db.execute('SELECT ... WHERE id = ?', (item.id,)) — query per loop iteration"
      - "ORM relationship accessed inside a loop without eager loading"

    remediation:
      summary: "Replace N+1 with batch query: db.execute('SELECT * FROM t WHERE id IN (?)', ids) outside the loop. For ORMs, use eager loading (joinedload, selectinload) or explicit batch fetch."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#e-query--performance"

    suppressions:
      - inline_comment: "# db-015-suppress"
        reason: "Loop is bounded (small N); N+1 is acceptable here"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal anti-pattern. N+1 loop + query pattern occurs in all languages. Detection looks for query execution inside iteration loops."

    action:
      audit_mode: report
      build_mode: warn

  - id: "db-016"
    name: "Automated backups enabled and scheduled"
    severity: high
    category: backup

    source:
      list: "LIST-3"
      section: "F"
      item: "Automated backups enabled (point-in-time recovery where the DB supports it)"

    regulatory_anchors: []

    detection:
      type: llm
      static:
        tool: null
        fallback_to_llm: true
        notes: |
          Checklist-style: LLM verifies backup config exists in infrastructure config, CI, or documented runbook. Not auto-detectable from source code alone. May require manual verification annotation.
          ENGINE-SPECIFIC DETECTION:
          - SQLite: look for sqlite3.backup() API call or file copy in backup scripts; verify cron/schedule
          - Postgres/RDS: verify automated snapshot retention policy in IaC (Terraform/CDK)
          - D1/Cloudflare: automatic daily backups — no configuration needed; report as PASS with note "D1 manages backups automatically"
          - MongoDB Atlas: automated backup enabled in atlas config
          If no backup evidence found: report high "No automated backup configured."
      llm:
        prompt_template: null
        context_scope: config_section
        estimated_tokens: 500

    triggers:
      - "No backup configuration found in infrastructure config (terraform, docker-compose, cloud config)"
      - "Database used in production context with no backup runbook documented"
      - "SQLite database with no sqlite3.backup() call or scheduled file copy"

    remediation:
      summary: "Configure automated backups: SQLite on-prem → scheduled file copy + WAL archiving via sqlite3.backup(); Postgres/RDS → enable point-in-time recovery, configure retention in IaC; D1 → automatic daily backups managed by platform (no action needed); MongoDB Atlas → enable automated backup. Note: backup encryption is a separate concern owned by ds-quality:security (sec-023 future)."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#f-backups--disaster-recovery"

    suppressions:
      - inline_comment: "# db-016-suppress"
        reason: "Backup configuration documented in ops runbook outside this repo"

    applies_to:
      languages: [python, typescript, javascript, golang, rust, yaml]
      file_types: [".yml", ".yaml", ".tf", ".py", ".ts", ".js", ".go", ".rs", ".md"]
      note: "Engine-specific detection. D1 auto-passes with informational note. Detection branches on detected database type from stack detector."

    action:
      audit_mode: report
      build_mode: null

