        notes: "LLM semantic: look for PII field names (email, ssn, dob, phone, address, credit_card, passport, tax_id) stored in columns typed as TEXT without explicit classification comments. Cross-reference with sec-013 (PII in runtime logs — different layer, complementary)."
      llm:
        prompt_template: null
