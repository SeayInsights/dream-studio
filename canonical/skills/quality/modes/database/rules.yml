  - id: "db-022"
    name: "Engine-specific: SQLite WAL mode; D1 eventual-consistency awareness"
    severity: medium
    category: engine-specific

    source:
      list: "LIST-3"
      section: "M"
      item: "SQLite (D1, edge DBs): WAL mode matters for concurrent reads; concurrent write limits"

    regulatory_anchors: []

    detection:
      type: static
      static:
        tool: null
        fallback_to_llm: true
        notes: |
          Engine detection: (1) look for 'import sqlite3', '.db' extension in config, PRAGMA statements → SQLite engine. (2) 'from cloudflare:d1' or D1 binding references → D1 engine. Apply engine-specific check. SQLite: verify PRAGMA journal_mode=WAL is set. D1: verify no row-level security assumptions.
          Fire only when SQLite or D1 is detected (via stack detector database_type signal).
          Skip on Postgres, MySQL, MongoDB, DynamoDB — WAL is SQLite-only.
      llm:
        prompt_template: null
        context_scope: config_section
        estimated_tokens: 500

    triggers:
      - "SQLite DB without PRAGMA journal_mode=WAL — default DELETE mode causes write-lock contention"
      - "D1 (Cloudflare) usage where reads from read-replicas assume immediate consistency"

    remediation:
      summary: "SQLite: Set PRAGMA journal_mode=WAL on first connection to enable concurrent reads with a single writer. Critical for any app with multiple readers. D1: Design reads to tolerate eventual consistency on read replicas; use the primary binding for consistency-sensitive reads."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#m-specific-engines--quick-gotchas"

    suppressions:
      - inline_comment: "# db-022-suppress"
        reason: "WAL mode not applicable — single-writer, single-reader context"

    applies_to:
      languages: [python, typescript, javascript]
      file_types: [".py", ".ts", ".js", ".toml", ".jsonc"]
      skip_on:
        languages: [golang, rust]
        reason: "db-022 is SQLite/D1-specific. Go and Rust projects using Postgres/MySQL/MongoDB do not have WAL mode or D1 eventual consistency concerns. Skip on non-SQLite detected projects."
      note: "SQLite-specific: WAL mode for concurrent reads. D1-specific: eventual consistency on read replicas. Skips when stack detector database_type is postgres, mysql, mongodb, or dynamodb."

    action:
      audit_mode: report
      build_mode: warn
