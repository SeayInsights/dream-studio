  - id: "db-019"
    name: "DB engine on supported version — no EOL"
    severity: high
    category: access

    source:
      list: "LIST-3"
      section: "I"
      item: "DB engine on a supported version (don't run EOL Postgres/MySQL/Mongo)"

    regulatory_anchors: []

    detection:
      type: static
      static:
        tool: null
        fallback_to_llm: true
        notes: |
          Detect DB engine version in requirements.txt, pyproject.toml, Dockerfile, docker-compose.yml, or .python-version. Compare against known EOL dates for SQLite (bundled with Python — generally safe), Postgres, MySQL, MongoDB.
          ENGINE-SPECIFIC DETECTION:
          - SQLite: bundled with Python runtime; check Python version in pyproject.toml/Dockerfile
          - Postgres: check Dockerfile or docker-compose.yml for image version vs postgres.org EOL schedule
          - MySQL: check image version vs mysql.com EOL schedule
          - MongoDB: check image version vs mongodb.com EOL schedule
          - D1/Cloudflare: managed — version management handled by platform, skip check
          EOL reference: https://endoflife.date/postgresql, /sqlite, /mysql, /mongodb
      llm:
        prompt_template: null
        context_scope: full_file
        estimated_tokens: 400

    triggers:
      - "DB engine version pinned to an EOL release in requirements or Dockerfile"
      - "DB engine image tag using :latest without pinning to a supported version"
      - "Python version in pyproject.toml or Dockerfile is EOL (implies bundled SQLite version concerns)"

    remediation:
      summary: "Pin to a supported, actively maintained version. For SQLite: use the bundled Python version (kept current). For Postgres/MySQL/MongoDB: check official EOL schedule at https://endoflife.date; upgrade to latest LTS. D1 manages versions automatically. EOL engines receive no security patches."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#i-vulnerability--patch-management"

    suppressions:
      - inline_comment: "# db-019-suppress"
        reason: "EOL version in use by explicit choice — migration planned"

    applies_to:
      languages: [python, typescript, javascript, golang, rust, yaml]
      file_types: [".txt", ".toml", ".yml", ".yaml", "Dockerfile", ".cfg", ".mod"]
      note: "Engine-specific detection. D1/managed databases skip this check. Detection branches on detected database type from stack detector."

    action:
      audit_mode: report
      build_mode: warn

  - id: "db-020"
    name: "No PII in non-PII columns (schema classification)"
