        estimated_tokens: 600

    triggers:
      - "Column named email, ssn, phone, address stored in a generic 'notes TEXT' or 'metadata JSON' column"
      - "PII field stored without access control or classification comment"

    remediation:
      summary: "Store PII in explicitly named, typed columns with access control comments. Separate PII into its own table where feasible for access control granularity. Add column comments documenting sensitivity level. Cross-ref: sec-013 owns runtime PII leaks in logs/URLs."
      guide_ref: "canonical/skills/quality/references/database-best-practices.md#c-data-classification--minimization"

    cross_references:
      - rule_id: "sec-013"
        skill: "ds-quality:security"
        reason: "sec-013 owns runtime PII leaks (logs, URLs, error messages). db-020 owns schema-level PII classification (wrong column design). Different layers — schema design vs. runtime behavior."
        surface_co_located: false

    suppressions:
      - inline_comment: "# db-020-suppress"
        reason: "PII column placement is intentional — access control documented in schema comments"

    applies_to:
      languages: [python, typescript, javascript, golang, rust]
      file_types: [".sql", ".py", ".ts", ".js", ".go", ".rs"]
      note: "Universal concept. PII schema classification applies regardless of database backend. Detection reads migration files and ORM schema definitions across all languages."

    action:
