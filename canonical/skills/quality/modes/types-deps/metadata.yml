description: >
  Type safety and dependency health audit. 8 rules: 4 type rules (pyright scope gap,
  Any leakage, type:ignore hygiene, annotation coverage) + 4 dependency rules (CVE gate
  non-blocking, dev lock absent, no license gate, circular imports). Project-agnostic —
  discovers the project's source layout rather than assuming any fixed structure. Two
  candidate/confirm rules (typ-002: Any leakage; dep-007: circular imports) clear obvious
  cases at AST level before LLM confirmation. Boundaries: vs pr-security-scan:dependency-audit
  (owns CVE findings + pinning correctness); vs code-quality (owns import ordering, not cycles);
  vs ops/18.6.3 (owns the tooling changes that close the gaps this skill reports).
