# Types & Dependencies Rules
# Source: canonical/skills/quality/references/types-deps-best-practices.md
# 8 rules: 4 types (typ-001 through typ-004) + 4 deps (dep-001, dep-002, dep-003, dep-007)
#
# Rule numbering follows the domain prefix convention:
#   typ-* = type safety rules (Section M-types of best-practices)
#   dep-* = dependency health rules (Section K of best-practices)
#   dep-007 (not dep-004) — reserving dep-004/005/006 for rules
#   owned by pr-security-scan:dependency-audit (CVE findings, pinning, unused)
#
# Candidate/confirm rules: typ-002, dep-007.
#   typ-002: static clears obvious boundary Any; LLM confirms interior leakage
#   dep-007: static clears TYPE_CHECKING-guarded cycles; LLM confirms unguarded ones
#
# PROJECT-AGNOSTIC: typ-001, dep-002, dep-003 discover this project's structure.
# They do NOT hardcode dream-studio's core/ / interfaces/ / spool/ layout.

rules:

  # ── Types family ────────────────────────────────────────────────────────────

  - id: "typ-001"
    name: "Type checker does not cover all production source directories"
    severity: high
    category: type_enforcement
    applies_to:
      languages: [python, typescript]
      file_types: [".py", ".ts", ".tsx", ".js", ".jsx"]
      note: "Per-ecosystem type checker config discovery. Python: pyrightconfig.json/mypy.ini. TypeScript: tsconfig.json include/exclude."

    source:
      doc: "canonical/skills/quality/references/types-deps-best-practices.md"
      section: "Section M-types"
      item: "Type checker configured and covering all production source directories"

    # CALIBRATION: Static config inspection only. No AST needed.
    # This rule is a FINDING that reports a gap; it does NOT modify the type checker config.
    # The resolution (expanding pyrightconfig.json / mypy coverage) is an ops/CI change.
    # PROJECT-AGNOSTIC: discovers this project's source dirs from pyproject.toml or
    # root-level __init__.py scan; compares to the type checker's include/coverage config.
    # Does NOT assume any specific directory names.
    #
    # Severity calibration: high (not critical) because the code is likely well-typed;
    # the gap is enforcement coverage, not annotation absence. Critical would be appropriate
    # if the checker is completely absent (no config file found at all).
    severity_no_checker: critical   # no type checker config found at all
    severity_partial_coverage: high  # checker exists but misses some source dirs
    severity_full_coverage: null     # pass — no finding

    detection:
      type: static
      tool: config
      notes: |
        1. Discover this project's production source dirs:
           a. Read pyproject.toml [tool.setuptools.packages.find], [tool.setuptools.packages],
              or [tool.coverage.run.source] if present.
           b. Fallback: scan root-level directories containing __init__.py.
           c. Exclude: tests/, docs/, .planning/, build/, dist/, __pycache__
        2. Find the type checker config (try in order: pyrightconfig.json, mypy.ini,
           .mypy.ini, [tool.mypy] in pyproject.toml, [tool.pyright] in pyproject.toml).
           If NONE found: report critical "No type checker configured."
        3. Read the checker's coverage declaration:
           - pyright: "include" array
           - mypy: "files" / "packages" list, or absence (mypy defaults to analyzing
             all files passed on command line, so check if it runs in CI).
        4. Compare: which discovered source dirs are NOT listed in the checker's include?
        5. Report: "Type checker covers X/N source directories. Uncovered: [list]"

          FOR TYPESCRIPT:
          1. Find tsconfig.json (or tsconfig.*.json) at project root.
             If absent: report critical "No TypeScript type checker config found (tsconfig.json missing)."
          2. Read "include" and "exclude" arrays from tsconfig.json.
          3. Discover production source dirs: all directories containing .ts/.tsx files
             (excluding node_modules/, dist/, build/, .next/, coverage/).
          4. Compare: any source dir NOT covered by tsconfig include?
             TypeScript's default (no "include") covers ALL files — so absence of "include" = full coverage.
             Report gap only if "exclude" removes source directories from checking.
          5. Report: "TypeScript type checker (tsc) covers X/N source dirs. Uncovered: [list]"

    triggers:
      - "Type checker config exists but does not include all source directories"
      - "No type checker config found (pyrightconfig.json, mypy.ini, pyproject.toml [tool.mypy])"

    suppressions:
      - inline_comment: "# typ-001: intentional — this directory is excluded from type checking"
        reason: "Operator explicitly excludes this directory with documented justification"

    remediation:
      summary: |
        Add uncovered source directories to your type checker's include/coverage config.
        For pyright: expand the "include" array in pyrightconfig.json.
        For mypy: add packages to [mypy] in pyproject.toml or mypy.ini.
        After expanding coverage, expect new type errors — these are the finding.
        Resolution of those errors is separate work; this rule tracks enforcement scope.
      guide_ref: "canonical/skills/quality/references/types-deps-best-practices.md#section-m-types-type-safety"

    action:
      build_mode: warn    # build mode notes if new files are in uncovered dirs


  - id: "typ-002"
    name: "Any used at non-boundary site (potential type erasure)"
    severity: high       # candidate severity; confirmed interior-leakage = critical
    category: type_safety
    applies_to:
      languages: [python, typescript]
      file_types: [".py", ".ts", ".tsx"]
      note: "Universal concept. Python: Any keyword. TypeScript: any type (equivalent interior leakage risk). Same LLM boundary classification applies."

    source:
      doc: "canonical/skills/quality/references/types-deps-best-practices.md"
      section: "Section M-types"
      item: "Any confined to system boundaries; not used in interior logic"

    # CALIBRATION: candidate/confirm hybrid.
    # Static pass has two stages:
    #   1. Find all Any usage in type-annotation positions.
    #   2. AUTO-ACCEPT (no LLM needed) obvious boundary patterns:
    #      - dict[str, Any], List[Any] in annotation position
    #      - Functions/params named parse_*, load_*, from_json, from_dict, deserialize_*, etc.
    #      - Parameters named data, payload, raw, response, body
    #      These are community-consensus legitimate boundary uses; auto-accepting them avoids
    #      200+ LLM confirmations on a well-typed codebase.
    #   3. Remaining candidates → LLM confirmation.
    #
    # LLM confirmation question (sharpened per gate decision):
    #   "Is a more specific type knowable here?" (interior leakage)
    #   vs. "Does the data genuinely arrive untyped from outside the system?" (benign boundary)
    #
    severity_static_candidate: high
    severity_confirmed: critical

    detection:
      type: hybrid
      static:
        tool: ast
        notes: |
          Stage 1 — find Any candidates:
          Parse source files via Python ast. Find `Any` used in:
          - Function parameter annotations (ast.arg.annotation)
          - Return type annotations (ast.FunctionDef.returns)
          - Variable annotations (ast.AnnAssign)
          Do NOT flag:
          - `from typing import Any` or `from typing_extensions import Any` (import lines)
          - `Any` used as a TYPE variable bound or constraint (rare; LLM handles if unclear)

          Stage 2 — auto-accept obvious boundaries (skip LLM for these):
          Accept without LLM if ANY of:
          a. Annotation form is `dict[str, Any]` / `Dict[str, Any]` / `list[Any]` / `List[Any]`
          b. Function name starts with: parse_, load_, from_json, from_dict, from_yaml,
             deserialize, decode_, read_, fetch_, get_ (high-confidence boundary)
          c. Parameter name is: data, payload, raw, response, body, result (boundary signal)
          d. Function's containing module name contains: parser, loader, deserializer,
             serializer, adapter, schema, codec
          e. The Any-annotated parameter has name `kwargs` (standard **kwargs typing)

          Stage 3 — remaining: report as "CANDIDATE (high) — Any at potentially non-boundary
          site; confirm whether a more specific type is knowable."

          FOR TYPESCRIPT:
          The equivalent of Python's `Any` in TypeScript is `any` (lowercase).
          Same interior leakage risk: `any` erases type information downstream.
          Stage 1 — find `any` candidates in TypeScript:
          - Function parameter type annotations typed as `: any`
          - Return types annotated as `: any`
          - Variable declarations typed as `: any`
          Do NOT flag: `any[]`, `Array<any>` in JSON parsing context (boundary pattern)

          Stage 2 — auto-accept obvious TypeScript boundaries (same logic as Python):
          - Parameter type is `Record<string, any>` / `Record<string, unknown>` (JSON boundary)
          - Function name starts with: parse, load, from, deserialize, decode, fetch, get
          - Parameter name is: data, payload, raw, response, body, result
          - Context is a JSON.parse() return value usage

          Remaining: report as "CANDIDATE — `any` at potentially non-boundary site"

        fallback_to_llm: true

      llm:
        prompt_template: |
          You are a type-safety auditor checking one specific rule.

          Rule: typ-002 — Any used at non-boundary site
          Severity: high (candidate) → critical if confirmed as interior leakage

          The static analysis found `Any` in a type annotation position that was not
          automatically recognized as an obvious JSON/external-data boundary.

          Context:
          {static_finding_excerpt}

          The key question is: **Is a more specific type knowable here?**

          Classify as INTERIOR LEAKAGE (confirm finding, critical severity) if:
          - The variable/parameter/return value's type IS determinable from the code context
            (e.g., it's always a str, always a Project object, always a list[dict]) but Any
            was used for convenience or to avoid a refactor.
          - Downstream code treats the Any-typed value as a specific type without re-checking.
          - The Any annotation removes type-checking guarantees for the callers of this function.

          Classify as BENIGN BOUNDARY (reject finding) if:
          - The data genuinely arrives untyped from outside the system (parsed JSON before
            validation, plugin return value, external API response with no schema, **kwargs).
          - A TypedDict or Protocol would be the "proper" type here, but the Any is a known
            temporary limitation at a system edge.
          - The function is explicitly a deserialization/parsing entry point.

          For TypeScript: `any` is the equivalent of Python's `Any`.
          INTERIOR LEAKAGE in TS: function parameter typed `any` when the type is knowable
          (e.g., always a string, always a User object), or `any` used in interior logic.
          BENIGN BOUNDARY in TS: JSON.parse() return value before validation,
          external API response with no schema, explicit escape hatch at library boundary.
          The verdict logic is identical to Python — is a more specific type knowable here?

          Return JSON exactly:
          {"finding": true|false, "confidence": 0.0-1.0, "location": "filename:function_or_var",
           "excerpt": "the specific Any annotation, max 80 chars",
           "verdict": "interior_leakage | benign_boundary",
           "explanation": "one sentence: why the type is or isn't knowable here"}

          Only return finding: true if confidence >= 0.75.
        context_scope: function
        estimated_tokens: 450

    triggers:
      - "Any in function parameter annotation (not auto-accepted as boundary pattern)"
      - "Any in return type annotation (not auto-accepted as boundary pattern)"
      - "Any in variable annotation (not dict[str, Any] or boundary context)"

    suppressions:
      - inline_comment: "# typ-002: boundary Any — [reason]"
        reason: "Operator confirms this is a boundary and documents why"

    remediation:
      summary: |
        Replace Any with a more specific type. Options by situation:
        - Known concrete type: use that type (str, int, list[str], etc.)
        - Structured dict: use TypedDict to describe the shape
        - Multiple possible types: use Union[str, int] or str | int (Python 3.10+)
        - Duck-typed interface: define a Protocol
        - Genuinely unvalidated external data: keep Any but add a comment; consider
          adding a validation step to narrow the type at the boundary
      guide_ref: "canonical/skills/quality/references/types-deps-best-practices.md#any-discipline"

    action:
      build_mode: warn    # warn if new function uses Any without boundary markers


  - id: "typ-003"
    name: "# type: ignore without justification comment"
    severity: medium
    category: type_hygiene
    applies_to:
      languages: [python, typescript]
      file_types: [".py", ".ts", ".tsx"]
      skip_on:
        languages: [go, rust]
        reason: "Go uses //nolint build tags (different mechanism); Rust uses #[allow(...)] attributes (different syntax). Neither maps to the type-ignore justification pattern. Skip cleanly."
      note: "Python: # type: ignore. TypeScript: // @ts-ignore / // @ts-expect-error. Same rule: suppression without justification is a hygiene violation."

    source:
      doc: "canonical/skills/quality/references/types-deps-best-practices.md"
      section: "Section M-types"
      item: "# type: ignore always accompanied by a brief justification comment"

    # CALIBRATION: Static grep only. No LLM needed.
    # Pattern: `# type: ignore` (bare) or `# type: ignore[rule]` with no subsequent explanation.
    # Pass: `# type: ignore  # stubs incomplete`, `# type: ignore[assignment]  # mypy bug #1234`
    # Fail: `# type: ignore`, `# type: ignore[misc]` (rule named but not explained)
    # The distinction: the RULE name (in [brackets]) says WHAT is being suppressed; the
    # trailing comment says WHY. We require WHY. Rule name alone is not sufficient.

    detection:
      type: static
      tool: grep_ast
      notes: |
        Search for: `# type: ignore` patterns in all Python files.
        Pass (no finding) if the comment has EITHER:
          - Text after `# type: ignore...` that is NOT just brackets: e.g., `# type: ignore  # reason`
          - Text after `# type: ignore[rule]` with additional explanation
        Fail (finding) if:
          - Bare `# type: ignore` with nothing following
          - `# type: ignore[rule]` with nothing following the closing bracket
          - `# pyright: ignore[rule]` with nothing following (apply same standard)
        Report: location + the full comment line

          FOR TYPESCRIPT:
          Search for: `// @ts-ignore` and `// @ts-expect-error` patterns in .ts/.tsx files.
          Pass (no finding) if the comment has EITHER:
            - Text following `// @ts-ignore` on the same line: e.g., `// @ts-ignore -- type stubs incomplete`
            - Text following `// @ts-expect-error` with explanation: `// @ts-expect-error -- known mypy false positive`
          Fail (finding) if:
            - Bare `// @ts-ignore` with nothing following on the same line
            - Bare `// @ts-expect-error` with nothing following
          Note: `@ts-expect-error` (preferred over `@ts-ignore` in TS 3.9+) requires a
          justification comment by this rule regardless of which form is used.
      fallback_to_llm: false

    triggers:
      - "# type: ignore with no explanation text following it"
      - "# type: ignore[rule] with no explanation text after the bracket"

    suppressions:
      - inline_comment: "# typ-003: bare suppress — pre-existing; tracked in issue #N"
        reason: "Operator acknowledges the bare suppress and has a tracking reference"

    remediation:
      summary: |
        Add a brief explanation after `# type: ignore`. Examples:
        - # type: ignore[assignment]  # third-party stubs are incomplete for this library
        - # type: ignore  # mypy false positive; see https://github.com/python/mypy/issues/NNNN
        - # type: ignore[return-value]  # dynamic return type from plugin interface
        The explanation should tell a future maintainer why the checker is being suppressed,
        so they can remove the suppression when the underlying issue is resolved.
      guide_ref: "canonical/skills/quality/references/types-deps-best-practices.md#section-m-types-type-safety"

    action:
      build_mode: null    # audit-only; build mode doesn't generate type:ignore comments


  - id: "typ-004"
    name: "Function missing return type annotation"
    severity: medium
    category: annotation_coverage
    applies_to:
      languages: [python, typescript]
      file_types: [".py", ".ts", ".tsx"]
      note: "Universal concept. Python: -> return annotation. TypeScript: explicit return type after function signature. Same AST detection, different syntax."

    source:
      doc: "canonical/skills/quality/references/types-deps-best-practices.md"
      section: "Section M-types"
      item: "All public function signatures annotated (parameters + return type)"

    # CALIBRATION: Static AST. No LLM needed.
    # Scope — PUBLIC functions only:
    #   Public = name does NOT start with _ (single underscore private functions are excluded).
    #   Dunder methods (__foo__) are a special case: most are exempt (see EXEMPT_DUNDERS below).
    #   Raw grep counts that include _private functions will OVERCOUNT by 2x or more on
    #   a well-typed codebase. The AST pass is the authoritative count; grep is NOT.
    #
    # Exemptions (do NOT flag — exempt at AST level, not manually):
    #   - All standard dunder methods: __init__, __del__, __new__, __str__, __repr__,
    #     __len__, __bool__, __eq__, __hash__, __lt__, __le__, __gt__, __ge__, __ne__,
    #     __iter__, __next__, __enter__, __exit__, __contains__, __getitem__, __setitem__,
    #     __delitem__, __call__, __class_getitem__, __init_subclass__, __set_name__,
    #     __get__, __set__, __delete__ — return types are well-known by protocol convention
    #   - @property getters — return type declared via the property descriptor
    #   - Test functions in test files — tst-* rules own test code
    #
    # OUTPUT FORMAT — summary-first, detail as drill-down:
    #   Report MUST lead with the gap summary, NOT a flat list of findings.
    #   A flat list of 50+ items is a wall nobody acts on.
    #   Format:
    #     "X% of public functions lack return annotations (N of ~M), in K files."
    #     Ranked file list (most unannotated first) → these are the actionable targets.
    #     Per-function detail is secondary (available on request / collapsible).
    #   Severity is set at the SUMMARY level (one medium finding per project), not per function.

    detection:
      type: static
      tool: ast
      notes: |
        Parse source files via Python ast.
        Find FunctionDef/AsyncFunctionDef where ALL are true:
          - returns is None (no -> annotation)
          - Name does NOT start with _ (not private/internal — single _ prefix excluded)
          - Name is NOT a standard dunder (see EXEMPT_DUNDERS list in calibration above)
          - File is NOT in tests/ or matches test_*.py pattern
          - No @property decorator in the decorator_list
        Collect ALL findings, then produce a SUMMARY REPORT (not a flat list):
          1. Compute: N unannotated / M total public functions = X%
          2. Group by file; rank files by unannotated count (highest first)
          3. Report:
               "X% of public functions lack return annotations (N of ~M), across K files.
                Top files by gap density:
                  17  core/observability/trace_logger.py
                   7  core/config/database.py
                   5  core/decisions/discovery.py
                  [...]
                Per-function detail available on request."
          4. Severity: one MEDIUM finding for the project (not per function).
             Escalate to HIGH if gap exceeds 20% of public functions.

          FOR TYPESCRIPT:
          Find function declarations/expressions where ALL are true:
            - No explicit return type annotation (`: TypeName` after parameter list)
            - Name does NOT start with _ (private convention)
            - NOT a constructor (constructor() has no meaningful return type)
            - NOT marked @private / @internal in JSDoc
            - File is NOT a *.test.ts or *.spec.ts file
            - Function is exported (exported = public API)
          Collect ALL findings; produce SUMMARY REPORT (same format as Python):
            "X% of exported TypeScript functions lack return type annotations (N of ~M), across K files."
          Note: TypeScript with `noImplicitAny: true` in tsconfig forces parameter types
          but NOT return types. `strict: true` enables `strictNullChecks` but not
          `noImplicitReturns` — so missing return types are common even in strict projects.
      fallback_to_llm: false

    triggers:
      - "Public function without -> return type annotation"

    suppressions:
      - inline_comment: "# typ-004: unannotated — dynamic return type; annotate as Any or narrow later"
        reason: "Operator acknowledges the missing annotation with documented justification"

    remediation:
      summary: |
        Add a return type annotation. Examples:
        - def get_user(user_id: str) -> User:
        - def process(items: list[str]) -> list[str]:
        - def load_config() -> dict[str, Any]:   (if return type is truly dict-shaped JSON)
        - def handle_event(event: dict) -> None:
        If the return type is unknown or depends on runtime data, use Any with a comment.
        Use `-> None` for functions that explicitly return nothing.
      guide_ref: "canonical/skills/quality/references/types-deps-best-practices.md#annotation-coverage"

    action:
      build_mode: warn    # build mode adds return type annotation stubs to new functions


  # ── Dependencies family ──────────────────────────────────────────────────────

  - id: "dep-001"
    name: "CVE gate is non-blocking (continue-on-error)"
    severity: high       # elevated to critical if actual CVEs currently pass through
    category: cve_enforcement
    applies_to:
      languages: [python, typescript, javascript]
      file_types: [".py", ".ts", ".tsx", ".js", ".jsx", ".json"]
      note: "Per-ecosystem CVE tool. Python: pip-audit/safety. TypeScript/JS: npm audit/yarn audit. CI config inspection pattern is portable."

    source:
      doc: "canonical/skills/quality/references/types-deps-best-practices.md"
      section: "Section K"
      item: "CVE scanner is configured AND blocking (not continue-on-error)"

    # CALIBRATION: Two-stage check.
    # Stage 1 (static): read CI yaml files for CVE tool steps; check for continue-on-error.
    # Stage 2 (dynamic): run the CVE tool on this project's requirements if possible.
    # Severity from REAL OUTPUT (not just config):
    #   - continue-on-error + CVEs present in current deps → critical (real exposure today)
    #   - continue-on-error + no CVEs currently → high (gate is latent risk; any new CVE slips through)
    #   - No CVE tool configured at all → critical (no gate)
    #   - CVE tool, blocking, no CVEs → pass (no finding)
    #   - CVE tool, blocking, CVEs present → NOT this rule (security:scan owns CVE findings)
    # This rule owns the ENFORCEMENT GAP, not the CVE findings themselves.

    detection:
      type: hybrid
      static:
        tool: config
        notes: |
          1. Scan .github/workflows/*.yml (and any CI config at root: .circleci/, Jenkinsfile, etc.)
             for steps that invoke: pip-audit, safety, cyclonedx-bom, or similar CVE tools.
          2. For each found step, check for `continue-on-error: true`.
          3. If no CVE tool found in CI at all → critical "No CVE gate configured."
          4. If CVE tool found with continue-on-error → proceed to dynamic stage.
          5. If CVE tool found, blocking (no continue-on-error) → pass on the enforcement check.
             (CVE findings, if any, are reported by pr-security-scan:dependency-audit.)

          FOR TYPESCRIPT/JAVASCRIPT (npm/yarn projects):
          1. Check for package.json (required for npm audit).
          2. Scan .github/workflows/*.yml for steps invoking: npm audit, yarn audit,
             snyk, socket, or equivalent Node CVE tools.
          3. For each found step, check for `continue-on-error: true`.
          4. If no CVE tool found in CI: report critical "No JS/TS CVE gate configured."
          5. If CVE tool found with continue-on-error: report high (non-blocking gate).
          6. If CVE tool found, blocking: pass on enforcement check.
        fallback_to_llm: false
      dynamic:
        tool: pip-audit
        command: "python -m pip_audit -r {requirements_file} --format json"
        notes: |
          Run pip-audit on this project's requirements file(s) if pip-audit is available.
          Parse output JSON for vulnerability count.
          If CVEs present + gate non-blocking → escalate severity to critical.
          If no CVEs + gate non-blocking → keep severity at high (latent risk).
          If pip-audit not available or requirements file not found → report enforcement
          gap at high severity without CVE count ("cannot verify current CVE status").

          FOR TYPESCRIPT/JAVASCRIPT (if dynamic scan available):
          command: "npm audit --json" (or "yarn audit --json" if yarn.lock present)
          Parse output for vulnerability count.
          If CVEs present + gate non-blocking: escalate severity to critical.
          If npm audit not available: report enforcement gap at high severity without CVE count.

    triggers:
      - "continue-on-error: true on CVE scanner step in CI"
      - "No CVE tool step found in any CI workflow"

    suppressions:
      - inline_comment: "# dep-001: non-blocking intentional — triaged, no actionable CVEs"
        reason: "Operator explicitly documents why non-blocking is accepted"

    remediation:
      summary: |
        Remove `continue-on-error: true` from the CVE scanner step to make it blocking.
        If the gate was non-blocking because existing CVEs would fail it: address the CVEs
        (upgrade packages, apply patches, or add justified exceptions in pip-audit's
        config) before making the gate blocking.
        pip-audit supports an audit configuration file (.pip-audit-ignore) for documented
        exceptions: https://pypa.github.io/pip-audit/
      guide_ref: "canonical/skills/quality/references/types-deps-best-practices.md#cve-gate-enforcement"

    action:
      build_mode: null    # build mode does not modify CI config


  - id: "dep-002"
    name: "Dependency lock not in sync or absent"
    severity: high
    category: dep_reproducibility
    applies_to:
      languages: [python, typescript, javascript]
      file_types: [".py", ".ts", ".tsx", ".js", ".jsx", ".json"]
      note: "Per-ecosystem lock file. Python: requirements.lock/poetry.lock/Pipfile.lock. TypeScript/JS: package-lock.json/yarn.lock/pnpm-lock.yaml."

    source:
      doc: "canonical/skills/quality/references/types-deps-best-practices.md"
      section: "Section K"
      item: "All dependencies locked to exact versions for reproducible installs"

    # CALIBRATION: Static file-presence check.
    # PROJECT-AGNOSTIC: checks for common lock file patterns in this project.
    # Acceptable lock strategies (any of these counts as "locked"):
    #   1. A pip-compile-generated .lock file alongside the .txt requirements
    #   2. poetry.lock (poetry projects)
    #   3. Pipfile.lock (pipenv projects)
    #   4. requirements.txt using ONLY == pins (the file IS the lock)
    # Separate check for dev deps: production lock present but no dev lock = high (distinct finding).
    # NOTE: the library-vs-application distinction. If pyproject.toml indicates this is a
    # library (has "classifiers" or "project.urls" with PyPI), note this in the finding.
    # Application projects SHOULD lock; library projects should NOT lock production (but
    # may still want a dev lock for reproducible CI).

    detection:
      type: static
      tool: config
      notes: |
        1. Detect project type: check pyproject.toml for classifiers indicating a library
           (presence of "Programming Language :: Python", "Framework :: ...", etc.) or
           for a requirements.txt / pyproject.toml with only >= bounds (library convention).
           If library: note it in the finding, reduce severity to medium for production lock.
        2. Check for production lock file (see config.yml lock_file_patterns).
           Also check if requirements.txt uses only == pins throughout.
        3. Check for dev lock file (see config.yml dev_lock_patterns).
           Also check if requirements-dev.txt uses only == pins throughout.
        4. Report:
           - Production lock absent (or only ranges, no lock file): high
           - Production lock present, dev lock absent: high (separate finding)
           - Both present: pass

          FOR TYPESCRIPT/JAVASCRIPT (npm/yarn/pnpm projects):
          1. Check for package.json (required for any lock check).
          2. Check for production lock file: package-lock.json (npm), yarn.lock (yarn),
             pnpm-lock.yaml (pnpm). Any one of these is sufficient.
          3. If lock file exists, check sync: compare package.json dependency versions
             against the lock file's resolved versions. If package.json was modified more
             recently than the lock file without a lock update → report "Lock out of sync."
          4. Note: package-lock.json and yarn.lock contain ALL deps (prod + dev).
             There is no separate dev lock file — one lock covers all.
          5. Report:
             - Lock absent: high
             - Lock present but out of sync (package.json newer): high
             - Lock present and in sync: pass
      fallback_to_llm: false

    triggers:
      - "No requirements.lock / poetry.lock / Pipfile.lock found"
      - "requirements-dev.txt present but no companion dev lock file"
      - "requirements files use >= ranges without a lock file"

    suppressions:
      - inline_comment: "# dep-002: no lock intentional — library project, not an application"
        reason: "Library projects should not lock production deps; operator confirms this is a library"
      - inline_comment: "# dep-002: dev lock intentional — pinned == in requirements-dev.txt"
        reason: "Operator uses == pins in the dev requirements file as the lock mechanism"

    remediation:
      summary: |
        For applications: generate a lock file with pip-compile (pip-tools):
          pip install pip-tools
          pip-compile requirements.txt --output-file requirements.lock
          pip-compile requirements-dev.txt --output-file requirements-dev.lock
        Commit both lock files. Run pip-compile on dependency updates.
        For libraries: lock dev deps only (CI reproducibility) but not production.
        For poetry projects: `poetry lock` generates poetry.lock automatically.
      guide_ref: "canonical/skills/quality/references/types-deps-best-practices.md#dependency-locking"

    action:
      build_mode: null    # build mode does not generate lock files


  - id: "dep-003"
    name: "No license gate configured"
    severity: high
    category: license_compliance
    applies_to:
      languages: [python, typescript, javascript]
      file_types: [".py", ".ts", ".tsx", ".js", ".jsx", ".json"]
      note: "Per-ecosystem license tool. Python: pip-licenses/liccheck. TypeScript/JS: license-checker/npm-license-checker. CI integration pattern is portable."

    source:
      doc: "canonical/skills/quality/references/types-deps-best-practices.md"
      section: "Section K"
      item: "License compatibility verified for all direct dependencies"

    # CALIBRATION: Static tool-presence check.
    # This rule checks that A license gate EXISTS — not what it contains.
    # The specific allowlist is organizational (not prescribed by this skill).
    # Output text points to tools and documentation; does NOT prescribe an allowlist.
    # Finding: "No license gate is configured. This means the project's dependency
    #           licenses have not been systematically verified."
    # Recommendation: tool-pointing, not policy-dictating.

    detection:
      type: static
      tool: config
      notes: |
        1. Check if pip-licenses is in requirements-dev.txt / pyproject.toml dev-deps.
        2. Check if liccheck or fossa is in requirements or CI config.
        3. Check for license config files: .licenserc, liccheck.ini, .fossa.yml, liccheck.cfg
        4. Check CI workflows for license-check steps.
        5. If NONE found: report "No license gate configured."
        6. If found: check that it is configured to FAIL on violations (not just report).
           A license tool in advisory mode (no fail) is lower severity (medium) than absent.

          FOR TYPESCRIPT/JAVASCRIPT (npm projects):
          1. Check if license-checker or npm-license-checker is in devDependencies.
          2. Check for license config files: .licensechecker.json, .license-check.json,
             .licensercrc, or a license field in package.json scripts.
          3. Check CI workflows for license-check steps invoking license-checker or similar.
          4. If NONE found: report "No JS/TS license gate configured."
          5. If found: check that CI step uses --failOn or equivalent (not just --csv output).
             Advisory mode (output only, no fail) is lower severity (medium) than absent.
      fallback_to_llm: false

    triggers:
      - "No pip-licenses, liccheck, or fossa tool found in requirements or CI"
      - "License tool found but configured in advisory mode only (no fail-on-violation)"

    suppressions:
      - inline_comment: "# dep-003: license review handled externally — [process ref]"
        reason: "Operator has an external license review process with documented reference"

    remediation:
      summary: |
        Install a license-checking tool and define your project's allowlist.
        Two common options:
        - pip-licenses (https://pypi.org/project/pip-licenses/): simple CLI tool that
          lists all dep licenses and can fail on violations.
          Usage: pip-licenses --allow-only="MIT;BSD-2-Clause;Apache-2.0;..." --fail-on-violation
        - liccheck (https://pypi.org/project/liccheck/): config-file-driven; supports
          allowlists and warnings in liccheck.ini or setup.cfg.
        Your allowlist should reflect your distribution model and legal requirements.
        Consult your organization's legal counsel for the specific licenses to allow.
        Common starting point for permissive commercial use: MIT, BSD-2-Clause,
        BSD-3-Clause, Apache-2.0, ISC, Python-2.0. GPL variants need legal review.
      guide_ref: "canonical/skills/quality/references/types-deps-best-practices.md#license-compatibility"

    action:
      build_mode: null    # build mode does not install or configure license tools


  - id: "dep-007"
    name: "Runtime circular import between modules"
    severity: high       # escalated to critical after LLM confirmation
    category: import_cycles
    applies_to:
      languages: [python]
      file_types: [".py"]
      note: "Phase 1: Python only. Phase 2 adds TypeScript (tsc --traceResolution + import type exclusion). Go/Rust are Phase 3/4."

    applies_to:
      languages: [python, typescript]
      file_types: [.py, .ts, .tsx]
      note: "Python: if TYPE_CHECKING guard exclusion. TypeScript: import type / type-only import exclusion. Same candidate/confirm structure."

    source:
      doc: "canonical/skills/quality/references/types-deps-best-practices.md"
      section: "Section K"
      item: "No runtime circular imports (TYPE_CHECKING / import-type-guarded imports are exempt)"

    # CALIBRATION: candidate/confirm hybrid.
    # The AST pass MUST clear type-annotation-only imports before generating candidates.
    #
    # Python: exclude imports inside `if TYPE_CHECKING:` blocks and function bodies.
    # TypeScript: exclude `import type { ... }` and `import { type X }` — these are erased
    #   by the TypeScript compiler and create NO runtime dependency.
    # Without this pruning, ~50% of findings are false positives.
    #
    # Static pass:
    #   1. Parse all source files, build import graph (module → modules it imports)
    #   2. EXCLUDE type-annotation-only import edges (see detection.static.notes per language)
    #   3. EXCLUDE imports inside function/method bodies (deferred, Python only)
    #   4. Run strongly-connected-component / DFS cycle detection on the PRUNED graph
    #   5. Only modules with cycles in the PRUNED graph become candidates
    #   6. Report as "CANDIDATE — runtime circular import detected after excluding type-only guards"
    #
    # LLM confirmation:
    #   The LLM sees only genuinely-ambiguous unguarded cycles. Its job is to confirm:
    #   "Is this actually a runtime cycle, or did the AST miss a deferred/conditional import?"
    #
    severity_static_candidate: high
    severity_confirmed: critical

    detection:
      type: hybrid
      static:
        tool: ast
        notes: |
          FOR PYTHON:
          Build import graph from Python AST:
          1. For each source file, parse with ast.parse().
          2. Walk ast.Import and ast.ImportFrom nodes.
          3. SKIP if the node is inside:
             - An `if TYPE_CHECKING:` block (ast.If where test is ast.Name('TYPE_CHECKING')
               or ast.Attribute(value=ast.Name('typing'), attr='TYPE_CHECKING'))
             - A function definition body (ast.FunctionDef / ast.AsyncFunctionDef)
             - A try/except block where the except branch handles ImportError — indicates
               optional dependency (skip this edge)
          4. Build directed graph: {module_path → set of imported module_paths}
             (resolve relative imports to absolute paths using the project's source root)
          5. Use DFS or SCC to find cycles in the pruned graph.
          6. For each cycle: report the cycle path (A → B → C → A) as a candidate.
          7. Do NOT escalate to critical at this stage — that requires LLM confirmation.

          FOR TYPESCRIPT:
          Build import graph from TypeScript AST:
          1. For each .ts/.tsx source file, parse import statements.
          2. SKIP (exclude from graph) any edge where:
             - Import is `import type { ... } from '...'` (TypeScript type-only import, TS 3.8+)
             - Import is `import { type X } from '...'` (inline type modifier, TS 4.5+)
             These are the TypeScript equivalent of Python's `if TYPE_CHECKING:` — they
             exist only for the type checker and create NO runtime dependency.
          3. Build directed graph: module_path → set of imported module_paths
             (resolve path aliases from tsconfig.json paths config; exclude node_modules)
          4. Use DFS or SCC to find cycles in the pruned graph.
          5. For each cycle: report the cycle path as a CANDIDATE.
             Do NOT escalate to critical — LLM confirmation required.

          FINDING HASH for TypeScript cycles:
          file_path = sorted(all_module_paths_in_cycle) joined with ","
          code_excerpt = None
          hash = SHA-256(f"dep-007|{sorted_canonical_cycle_path}|")
          This ensures the hash is stable regardless of which module is "first" in the cycle.
          Example: cycle A.ts → B.ts → A.ts → hash = SHA-256("dep-007|A.ts,B.ts|")
        fallback_to_llm: true

      llm:
        prompt_template: |
          You are a dependency health auditor checking one specific rule.

          Rule: dep-007 — Runtime circular import between modules
          Severity: high (candidate) → critical if confirmed as real runtime cycle

          The static analysis found a potential circular import cycle AFTER excluding
          type-annotation-only imports (Python: `if TYPE_CHECKING:` blocks and function
          bodies; TypeScript: `import type` statements).

          Detected cycle:
          {cycle_path}

          Relevant import statements from each module in the cycle:
          {static_finding_excerpt}

          For Python: confirm whether this is a REAL RUNTIME CIRCULAR IMPORT:
          - Does the cycle exist at module load time (when Python executes the import
            statements at the top of each file)?
          - OR is there a structural reason the AST missed that breaks the cycle at runtime
            (e.g., a conditional import, an __all__ guard, a lazy-loading pattern, a
            deferred attribute lookup)?

          If it is a real runtime cycle: it will produce ImportError or AttributeError
          depending on import order. Confirm it is critical.

          If it is NOT a real runtime cycle: explain what breaks the cycle at runtime.

          For TypeScript: confirm whether the detected cycle is a REAL RUNTIME CYCLE
          after excluding `import type` statements.

          A TypeScript `import type` does NOT create a runtime dependency — the TypeScript
          compiler erases it before emitting JavaScript. Only `import { Value }` (not `type`)
          creates a runtime dependency.

          REAL RUNTIME CYCLE in TypeScript: A.ts has `import { SomeClass } from './B'`
          AND B.ts has `import { OtherClass } from './A'` — both are value imports.
          This creates a circular dependency in the emitted JavaScript.

          NOT A RUNTIME CYCLE: A.ts has `import type { AType } from './B'` AND B.ts has
          `import { SomeClass } from './A'` — A's import of B is type-only, erased at runtime.

          Check each edge in the cycle: are ALL of them value imports (not type-only)?
          If any edge is `import type` → the cycle is NOT a runtime cycle.

          Return JSON exactly:
          {"finding": true|false, "confidence": 0.0-1.0,
           "cycle": "A → B → C → A (simplified path)",
           "verdict": "real_runtime_cycle | broken_at_runtime",
           "explanation": "one sentence: why this is or isn't a real runtime cycle"}

          Only return finding: true if confidence >= 0.75.
        context_scope: module_group    # provide all files in the cycle as context
        estimated_tokens: 500

    triggers:
      - "Module-level circular import detected (excluding TYPE_CHECKING guards and deferred imports)"

    suppressions:
      - inline_comment: "# dep-007: acknowledged cycle — [reason]; refactor tracked in #N"
        reason: "Operator acknowledges the cycle with a documented refactor plan"

    remediation:
      summary: |
        Resolve the circular import by one of:
        1. Extract the shared concept into a third module that both A and B import
           (the most architecturally sound solution — the cycle often reveals a missing abstraction)
        2. Use `if TYPE_CHECKING:` guard for any import that's only needed for type hints:
              from __future__ import annotations
              from typing import TYPE_CHECKING
              if TYPE_CHECKING:
                  from core.b import B  # typing-only; no runtime cycle
        3. Move the import inside the function that needs it (deferred import):
              def my_function() -> "B":
                  from core.b import B  # delayed until function call
                  return B()
        Option 1 is preferred. Options 2 and 3 are acceptable workarounds.
        Note: Option 2 is the community-standard idiom and is NOT flagged as a cycle by
        this rule (the static pass excludes TYPE_CHECKING guards at the AST level).
      guide_ref: "canonical/skills/quality/references/types-deps-best-practices.md#circular-imports"

    action:
      build_mode: null    # build mode does not restructure import graphs
