skill_id: database-compliance
skill_name: Database Compliance Quality
pack: quality
mode: database-compliance
skill_description: |
  Audits databases and data-handling code for regulatory compliance: PII classification,
  retention policies, right to erasure/access, consent tracking, and data minimization.
  GDPR default with config-driven opt-in for HIPAA, CCPA, and COPPA.
  Auto-skips when no PII schema detected (has_pii_schema=False).
