skill_id: pre-launch
skill_name: Pre-Launch Readiness
pack: quality
mode: pre-launch
skill_description: |
  Audits services for launch readiness: legal documents, release documentation,
  operational readiness, security/privacy sign-off, and feature safety.
  Service-type-aware: legal doc rules (pl-001/002) only fire on consumer-facing services.
  Phase 2 (18.8.x) adds orchestration wrapper calling all quality skills.
supports_brownfield: true
phase: 1
applies_to: [consumer, internal-service, developer-tool, library]
rules_phase1: 20
deferred_phase2:
  - orchestration_wrapper  # calls all 10+ quality skills, maps to T1/T2/T3 launch verdict
tier_system:
  T1: launch_blocking     # must fix before launch; exit code 1
  T2: launch_warning      # should fix; surfaced but not blocking
  T3: advisory            # nice-to-have; informational only
