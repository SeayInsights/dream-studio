# Power BI Accessibility Checklist (WCAG 2.1)
# Source: Microsoft Power BI + WCAG Guidelines

color_contrast:
  text_4_5_to_1_normal: false
  text_3_to_1_large_18px_plus: false
  non_text_chart_elements_3_to_1: false
  color_not_sole_indicator: false

alternative_formats:
  alt_text_all_visuals: false
  data_table_alongside_charts: false
  text_descriptions_for_key_insights: false

keyboard_navigation:
  tab_order_logical: false
  focus_indicators_visible: false
  all_interactions_keyboard_accessible: false

chart_selection:
  simple_chart_types_preferred: false  # bar, line
  avoid_3d_charts: false
  clutter_removed: false

mobile_accessibility:
  mobile_layout_created: false
  touch_targets_minimum_48x48dp: false

screen_reader_support:
  report_title_descriptive: false
  visual_titles_descriptive: false
  tooltips_meaningful: false

performance:
  report_loads_under_5_seconds: false
  aggregated_data_used: false

verdict: ""  # accessible | needs_work
wcag_level: ""  # AA | AAA | non_compliant
