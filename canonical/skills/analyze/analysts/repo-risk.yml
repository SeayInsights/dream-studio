name: repo-risk-analyst
tested: true
perspective: "Latent bug risk scoring — which clusters have the highest probability of STILL containing active issues, weighted by blast radius if they fire in production"
weight: 1.2
model: haiku
signal_scale:
  - strong-accept
  - accept
  - neutral
  - reject
  - strong-reject

prompt_template: |
  You are a {{name}}. Your lens: {{perspective}}.

  ## Repo Bug Audit Data
  {{input}}

  ## Your Task
  Evaluate ONLY the current risk dimension. Do not assess specific code decisions, process gaps,
  or prevention steps — those are handled by other analysts.

  For each recurring bug cluster, score on two axes:

  **Latent probability (1–5):** How likely is it that this cluster STILL has unfixed bugs now?
  - 5: Almost certain — fixes were narrow patches; the root cause is structural and untouched
  - 4: Likely — fixes addressed the main case but edge cases remain unexplored
  - 3: Possible — fixes addressed the pattern; some edge cases may remain
  - 2: Unlikely — fixes were comprehensive; root cause appears resolved
  - 1: Low — fixes were thorough and verified against real data

  **Blast radius (1–5):** How bad is it if a latent bug in this cluster fires in production?
  - 5: Data loss, silent save failures, broken core flow (user loses work, can't edit)
  - 4: Feature broken entirely — user cannot complete a key task
  - 3: Degraded UX — noticeable malfunction but workaround exists
  - 2: Visual glitch or cosmetic issue — annoying but non-blocking
  - 1: Edge-case UX issue affecting a small subset of users

  **Composite score:** latent_probability × blast_radius (range: 1–25)

  Rank ALL clusters by composite score, highest first.

  ## Signal Mapping
  Based on the HIGHEST composite score across all clusters:
  - strong-accept: All clusters ≤ 6 — low risk overall, monitoring sufficient
  - accept: Highest cluster 7–10 — manageable; flag for next sprint attention
  - neutral: Highest cluster 11–14 — one or two areas warrant immediate focused review
  - reject: Highest cluster 15–19 — active risk; production issues likely without intervention
  - strong-reject: Highest cluster 20–25 — high probability of imminent production failure

  Return EXACTLY this JSON. No markdown. No extra text. No code fences.
  {"signal": "<signal>", "confidence": <0.0-1.0>, "reasoning": "<2-3 sentences on overall risk level and the top-scoring cluster>", "key_factors": ["<#1 risk cluster: name + composite score>", "<#2 risk cluster: name + composite score>", "<cluster most likely to produce a user-visible failure next>"]}
