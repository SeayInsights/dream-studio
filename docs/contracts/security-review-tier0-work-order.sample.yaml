# Observe-only Tier 0 Security Review Work Order template sample
# Documentation/template data only. Not a completed target review.
artifact_kind: "SecurityReviewTier0WorkOrderTemplate"
template_id: "security_review_tier0_observe_only"
template_version: "0.1.0"
work_order_kind: "security_review"
tier: "T0"
approval_mode: "observe_only"
risk_level: "medium"
execution_status: "non_executing_template"
not_a_target_review: true
source_contract_refs:
  security_profile_pack: "docs/contracts/security-review-profile-pack-contract.md"
  structured_catalog: "docs/contracts/security-review-scan-catalog.yaml"
  catalog_governance: "docs/contracts/security-review-catalog-governance.md"
  report_artifact_contract: "docs/contracts/security-review-report-artifact-contract.md"
  dashboard_projection_contract: "docs/contracts/dashboard-projection-model-contract.md"
target_intake_required:
  target_id: "required_at_instantiation"
  display_name: "required_at_instantiation"
  repo_path: "required_at_instantiation"
  repo_kind: "required_at_instantiation"
  default_branch: "required_at_instantiation"
  active_branch_policy: "required_at_instantiation"
  remote_name: "required_at_instantiation"
  allowed_read_scope: "required_at_instantiation"
  target_output_restrictions: "required_at_instantiation"
  generated_artifact_policy: "required_at_instantiation"
  dependency_change_policy: "required_at_instantiation"
  schema_migration_policy: "required_at_instantiation"
  known_dirty_policy: "required_at_instantiation"
  privacy_export_classification: "required_at_instantiation"
tier0_scan_selection:
  structured_catalog_ref: "docs/contracts/security-review-scan-catalog.yaml"
  selection_rule: "tier == T0 and execution_status == non_executing_definition and command_template == null"
  total_selected: 18
  selected_scan_ids:
    - "sec.dependency.vulnerability_inventory"
    - "sec.dependency.lockfile_integrity"
    - "sec.secrets.high_entropy_patterns"
    - "sec.secrets.env_template_drift"
    - "sec.static.injection_patterns"
    - "sec.static.unsafe_eval_exec"
    - "sec.auth.access_boundary_review"
    - "sec.auth.session_cookie_policy"
    - "sec.api.cors_policy_review"
    - "sec.api.input_validation_surface"
    - "sec.release.branch_state_evidence"
    - "sec.release.forbidden_artifact_write_check"
    - "sec.static.xss_output_encoding"
    - "sec.static.memory_safety_boundary_review"
    - "sec.static.concurrency_race_review"
    - "sec.static.ssrf_request_boundary_review"
    - "sec.static.xxe_parser_review"
    - "sec.auth.broken_auth_logic_review"
observe_only_boundary:
  allowed:
    - "inspect file-backed Work Order scope"
    - "inspect target intake supplied by the future instantiated Work Order"
    - "inspect pre-existing file-backed evidence explicitly supplied by the Work Order"
    - "record findings and limitations under Dream Studio Work Order storage"
    - "recommend bounded next Work Orders"
  forbidden:
    - "target repo mutation"
    - "scan execution"
    - "target validation"
    - "dependency installation"
    - "lockfile changes"
    - "generated artifacts inside target repos"
    - "stage"
    - "commit"
    - "push"
    - "runtime implementation"
    - "CLI command implementation"
    - "dashboard UI/API/runtime projection builder implementation"
    - "profile registry implementation"
    - "DB/event/schema/Docker/dashboard/TORII/cloud/org/global/enterprise expansion"
evidence_requirements:
  before_review:
    - "target intake fields or missing-field list"
    - "Security Review Profile Pack ref"
    - "structured catalog ref"
    - "Tier 0 scan selection proof"
    - "no scan execution authorization proof"
    - "output location outside target repos"
  during_review:
    - "file-backed evidence refs"
    - "evidence limitations"
    - "command_result: not_run"
  after_review:
    - "SecurityReviewReport"
    - "SecurityEvidenceRecord"
    - "SecurityFindingRecord when findings exist"
    - "AcceptedRiskRecord only with file-backed operator decision"
    - "ReleaseGateSummary"
    - "DashboardProjectionSnapshot inputs"
output_artifacts:
  review_report: "<storage_root>/<work_order_id>/security/review_report.yaml"
  evidence_records: "<storage_root>/<work_order_id>/security/evidence/*.yaml"
  finding_records: "<storage_root>/<work_order_id>/security/findings/*.yaml"
  accepted_risk_records: "<storage_root>/<work_order_id>/security/accepted_risks/*.yaml"
  release_gate: "<storage_root>/<work_order_id>/security/release_gate.yaml"
  dashboard_projection_inputs: "<storage_root>/<work_order_id>/dashboard/projection_inputs.yaml"
release_gate_decision_policy:
  allowed_decisions:
    - "SECURITY_CLEAR"
    - "SECURITY_CLEAR_WITH_RISKS"
    - "ACCEPT_RISK_WITH_APPROVAL"
    - "REMEDIATE_BEFORE_RELEASE"
    - "RUN_ADDITIONAL_SECURITY_REVIEW"
    - "HOLD"
    - "FAIL"
  missing_evidence_default: "RUN_ADDITIONAL_SECURITY_REVIEW"
  unclear_authority_default: "HOLD"
  forbidden_action_default: "FAIL"
dashboard_projection_readiness:
  required_fields:
    - "work_order_id"
    - "phase_name"
    - "approval_mode"
    - "risk_level"
    - "readiness"
    - "verdict"
    - "final_decision"
    - "next_action"
    - "report_ref"
    - "handoff_ref"
    - "blocking_risks"
    - "security_review_report_ref"
    - "release_gate_decision"
    - "taxonomy_coverage"
    - "scan_status_counts"
    - "findings_by_severity"
    - "findings_by_release_impact"
    - "blocking_findings"
    - "accepted_risks"
    - "deferred_scans"
    - "evidence_inventory_refs"
    - "next_work_order_recommendation"
next_work_order_recommendation:
  allowed_recommendations:
    - "target intake completion"
    - "observe-only Tier 0 review execution against an explicitly scoped target"
    - "additional security review planning"
    - "remediation planning"
    - "risk acceptance decision"
    - "release planning with risks"
    - "dashboard projection implementation planning"
  forbidden_recommendations:
    - "automatic scan execution"
    - "automatic remediation"
    - "automatic risk acceptance"
    - "automatic push"
    - "dashboard authority"
