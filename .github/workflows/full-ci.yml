name: Full CI

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why the full local parity gate is being run"
        required: true
        default: "manual release-readiness validation"

permissions:
  contents: read

jobs:
  full-ci:
    name: full-ci
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run local parity release gate
        run: python interfaces/cli/ci_gate.py

      - name: Test suite with coverage
        run: >
          python -m pytest tests/
          --cov=core --cov=runtime --cov=interfaces --cov=spool
          --cov=projections --cov=emitters --cov=canonical --cov=control
          --cov-report=term-missing
          --cov-fail-under=8
          -q --tb=short
