name: Release Validation

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release branch, tag, or candidate being validated"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-validation:
    name: release-validation
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run release gate
        run: python interfaces/cli/ci_gate.py

      - name: Validate release profile
        run: python -m pytest tests/unit/test_github_pr_cicd_release_gate.py -q --tb=short

      - name: Confirm no deployment occurs
        run: |
          echo "Release validation is evidence only."
          echo "Deploy, publish, merge, and tag creation remain separate operator-approved boundaries."
