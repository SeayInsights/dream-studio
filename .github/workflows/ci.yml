name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate plugin.json
        shell: python
        run: |
          import json, sys
          from pathlib import Path
          manifest = Path(".claude-plugin/plugin.json")
          with manifest.open() as f:
              m = json.load(f)
          required = ["name", "version", "description", "license"]
          missing = [k for k in required if k not in m]
          if missing:
              print(f"plugin.json missing keys: {missing}")
              sys.exit(1)
          print(f"plugin.json OK: {m['name']}@{m['version']}")

      - name: Install dev deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        shell: bash
        run: |
          pytest tests/ -v --cov=hooks/lib --cov=packs/domains/domain_lib --cov-report=term-missing

      - name: Validate coach analyst coverage
        shell: bash
        run: python scripts/validate_analysts.py

  ci-gate:
    name: ci-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - name: Run CI gate
        run: python scripts/ci_gate.py

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev deps
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt
      - name: pip-audit
        run: pip-audit -r requirements-dev.txt
