name: PR Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-smoke:
    name: pr-smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Contract docs drift
        env:
          DREAM_STUDIO_BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: python interfaces/cli/contract_docs_drift_gate.py

      - name: Contract Atlas lifecycle
        env:
          DREAM_STUDIO_BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: python interfaces/cli/contract_atlas_lifecycle_gate.py

      - name: Format check
        run: python -m black --check .

      - name: Lint baseline check
        run: python interfaces/cli/lint_baseline.py check

      - name: Dependency vulnerability scan
        continue-on-error: true
        run: python -m pip_audit -r requirements-dev.txt -r requirements.txt

      - name: Focused smoke tests
        run: >
          python -m pytest
          tests/unit/test_contract_docs_drift_gate.py
          tests/unit/test_contract_atlas_lifecycle.py
          tests/unit/test_github_pr_cicd_release_gate.py
          tests/unit/test_release_gate_lint_baseline_policy.py
          -q --tb=short
