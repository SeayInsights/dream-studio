name: PR Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-smoke:
    name: pr-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Validate plugin manifest
        shell: python
        run: |
          import json
          import sys
          from pathlib import Path

          manifest = Path(".claude-plugin/plugin.json")
          data = json.loads(manifest.read_text(encoding="utf-8"))
          required = ["name", "version", "description", "license"]
          missing = [key for key in required if key not in data]
          if missing:
              print(f"plugin.json missing keys: {missing}")
              sys.exit(1)
          print(f"plugin.json OK: {data['name']}@{data['version']}")

      - name: Contract docs drift
        env:
          DREAM_STUDIO_BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: python interfaces/cli/contract_docs_drift_gate.py

      - name: Contract Atlas lifecycle
        env:
          DREAM_STUDIO_BASE_REF: origin/${{ github.base_ref || 'main' }}
        run: python interfaces/cli/contract_atlas_lifecycle_gate.py

      - name: Format check
        run: python -m black --check .

      - name: Lint baseline check
        run: python interfaces/cli/lint_baseline.py check

      - name: Focused smoke tests
        run: >
          python -m pytest
          tests/unit/test_contract_docs_drift_gate.py
          tests/unit/test_contract_atlas_lifecycle.py
          tests/unit/test_github_pr_cicd_release_gate.py
          tests/unit/test_release_gate_lint_baseline_policy.py
          -q --tb=short
