name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate plugin.json
        shell: python
        run: |
          import json, sys
          from pathlib import Path
          manifest = Path(".claude-plugin/plugin.json")
          with manifest.open() as f:
              m = json.load(f)
          required = ["name", "version", "description", "license"]
          missing = [k for k in required if k not in m]
          if missing:
              print(f"plugin.json missing keys: {missing}")
              sys.exit(1)
          print(f"plugin.json OK: {m['name']}@{m['version']}")

      - name: Install dev deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests (fast)
        shell: bash
        run: |
          pytest tests/unit/ -v

      - name: Run integration tests with coverage
        shell: bash
        run: |
          pytest tests/integration/ -v --cov=hooks/lib --cov-report=term-missing --cov-fail-under=80
