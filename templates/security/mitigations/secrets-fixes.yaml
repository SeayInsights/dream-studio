# Secrets & Credential Fix Templates
# Maps rule IDs, CWE codes, and OWASP categories to secrets/credential mitigation patterns.
# rule_pattern is pipe-delimited: any token match triggers this template.
# Covers KRG-sec-001 through KRG-sec-005 and related hardcoded credential findings.

- rule_pattern: "KRG-sec-001|CWE-798|hardcoded-password|hardcoded-credential|password-in-code"
  title: "Hardcoded Password — Move Credentials to Environment Variables or Secrets Manager"
  cwe: "CWE-798"
  owasp_category: "A02:2021"
  immediate_fix:
    description: "Remove the hardcoded password from source code; load it from an environment variable at runtime"
    code_before: |
      DB_PASSWORD = "Kroger$uperSecret2024!"

      conn = psycopg2.connect(
          host="db.vendor-portal.internal",
          password=DB_PASSWORD
      )
    code_after: |
      import os

      DB_PASSWORD = os.environ["DB_PASSWORD"]  # fails loudly if missing

      conn = psycopg2.connect(
          host="db.vendor-portal.internal",
          password=DB_PASSWORD
      )
  long_term_fix: "Migrate all credentials to a secrets manager (AWS Secrets Manager, HashiCorp Vault, or Azure Key Vault); rotate the compromised credential immediately; add Semgrep rule KRG-sec-001 and gitleaks pre-commit hook to prevent future occurrences"
  verification_test: "grep -rn 'Kroger\\|SuperSecret\\|password\\s*=\\s*[\"\\x27]' {file} should return 0 matches (excluding comments and test fixtures); gitleaks detect --source . returns 0 findings"
  effort_estimate: "1h per instance + credential rotation"
  requires_context: false
  references:
    - "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
    - "https://github.com/zricethezav/gitleaks"

- rule_pattern: "KRG-sec-002|CWE-321|api-key-in-code|hardcoded-api-key|api-key-literal"
  title: "API Key in Source Code — Load from Vault or Environment Variable"
  cwe: "CWE-321"
  owasp_category: "A02:2021"
  immediate_fix:
    description: "Remove the API key literal from source; inject it via environment variable or a secrets manager client at startup"
    code_before: |
      OPENAI_API_KEY = "sk-proj-abc123xyz789EXAMPLE"

      client = openai.OpenAI(api_key=OPENAI_API_KEY)
    code_after: |
      import os

      client = openai.OpenAI(api_key=os.environ["OPENAI_API_KEY"])
    # Key is injected by the deployment platform (GitHub Actions secret, Kubernetes secret, etc.)
  long_term_fix: "Use a vault integration (e.g., hvac for HashiCorp Vault) to fetch API keys at runtime with short TTLs; implement automatic key rotation; revoke the exposed key immediately in the provider's dashboard"
  verification_test: "grep -rn 'sk-proj-\\|sk-[a-zA-Z0-9]\\{20,\\}' {file} returns 0 matches; run gitleaks detect --source . to confirm no key in git history"
  effort_estimate: "30m per instance + key rotation"
  requires_context: false
  references:
    - "https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html"
    - "https://docs.github.com/en/actions/security-guides/encrypted-secrets"

- rule_pattern: "KRG-sec-003|CWE-256|connection-string-credentials|db-url-credentials|connection-string-plaintext"
  title: "Connection String with Embedded Credentials — Use Connection Pooler or Environment Variable"
  cwe: "CWE-256"
  owasp_category: "A02:2021"
  immediate_fix:
    description: "Remove the username and password from the connection string literal; compose the URL from environment variables at runtime"
    code_before: |
      DATABASE_URL = "postgresql://admin:KrogerDB2024@db.internal:5432/vendor_portal"

      engine = create_engine(DATABASE_URL)
    code_after: |
      import os

      DATABASE_URL = (
          f"postgresql://{os.environ['DB_USER']}:{os.environ['DB_PASSWORD']}"
          f"@{os.environ['DB_HOST']}:{os.environ.get('DB_PORT', '5432')}"
          f"/{os.environ['DB_NAME']}"
      )

      engine = create_engine(DATABASE_URL)
  long_term_fix: "Use PgBouncer or RDS IAM authentication to eliminate static credentials entirely; store the composed URL in a secrets manager rather than constructing it in application code"
  verification_test: "grep -rn 'postgresql://\\|mysql://\\|mongodb://' {file} | grep -v 'os.environ\\|env\\[' should return 0 matches; validate DB connection with env vars set in CI"
  effort_estimate: "1h per instance + credential rotation"
  requires_context: false
  references:
    - "https://cheatsheetseries.owasp.org/cheatsheets/Database_Security_Cheat_Sheet.html"
    - "https://docs.sqlalchemy.org/en/14/core/engines.html#postgresql"

- rule_pattern: "KRG-sec-004|CWE-312|private-key-in-code|private-key-hardcoded|rsa-key-literal|pem-in-source"
  title: "Private Key in Source Code — Use Key Management Service"
  cwe: "CWE-312"
  owasp_category: "A02:2021"
  immediate_fix:
    description: "Remove the private key from source; load it from a file path or secret store at runtime; never commit PEM blocks"
    code_before: |
      PRIVATE_KEY = """
      -----BEGIN RSA PRIVATE KEY-----
      MIIEpAIBAAKCAQEA...
      -----END RSA PRIVATE KEY-----
      """

      key = serialization.load_pem_private_key(PRIVATE_KEY.encode(), password=None)
    code_after: |
      import os
      from cryptography.hazmat.primitives import serialization

      key_path = os.environ["PRIVATE_KEY_PATH"]  # path to key file, not the key itself
      with open(key_path, "rb") as f:
          key = serialization.load_pem_private_key(f.read(), password=None)
    # Better: use KMS (AWS KMS, GCP KMS) to sign without ever loading the raw key
  long_term_fix: "Migrate signing operations to a Key Management Service (AWS KMS, Azure Key Vault, GCP KMS) — the application sends data to be signed and receives the signature; the private key never leaves the KMS boundary; rotate the exposed key pair immediately"
  verification_test: "grep -rn 'BEGIN RSA\\|BEGIN EC\\|BEGIN PRIVATE KEY\\|BEGIN OPENSSH' {file} returns 0 matches; gitleaks detect --source . confirms no key in git history"
  effort_estimate: "4h + immediate key pair rotation"
  requires_context: true
  references:
    - "https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html"
    - "https://docs.aws.amazon.com/kms/latest/developerguide/concepts.html"

- rule_pattern: "KRG-sec-005|CWE-798|env-var-fallback|hardcoded-default|default-credential-fallback"
  title: "Env Var Fallback to Hardcoded Value — Remove Default, Fail on Missing"
  cwe: "CWE-798"
  owasp_category: "A02:2021"
  immediate_fix:
    description: "Remove the hardcoded fallback from os.getenv(); use os.environ[] which raises KeyError if the variable is not set, forcing an explicit configuration error at startup"
    code_before: |
      SECRET_KEY = os.getenv("SECRET_KEY", "dev-secret-do-not-use-in-prod")
      JWT_SECRET = os.getenv("JWT_SECRET", "changeme")
    code_after: |
      import os

      SECRET_KEY = os.environ["SECRET_KEY"]  # KeyError at startup if not set
      JWT_SECRET = os.environ["JWT_SECRET"]  # loud failure > silent insecurity
  long_term_fix: "Adopt a settings validation library (pydantic-settings or dynaconf) that reads env vars at startup and raises a descriptive error listing every missing required variable; add a startup smoke test that verifies all required env vars are present before the app serves traffic"
  verification_test: "unset SECRET_KEY && python app.py — expect KeyError or startup error (not silent fallback); grep -rn 'getenv.*changeme\\|getenv.*do-not-use\\|getenv.*default' {file} returns 0 matches"
  effort_estimate: "30m per instance"
  requires_context: false
  references:
    - "https://12factor.net/config"
    - "https://docs.pydantic.dev/latest/concepts/pydantic_settings/"
