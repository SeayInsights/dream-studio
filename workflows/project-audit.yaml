name: project-audit
description: >
  Full project audit — harden (structure + best practices), secure (OWASP + STRIDE),
  then review (code quality) — run sequentially with director gates between each phase.
  Invoke from the project root directory, or say "workflow: project-audit path: <absolute-path>".
version: 1
on_failure: abort

gates:
  after-harden:
    type: pause
    prompt: "Harden complete. Review findings above, then approve to proceed to security audit?"
  after-secure:
    type: pause
    prompt: "Security audit complete. Review findings above, then approve to proceed to code review?"

nodes:
  - id: harden
    skill: harden
    model: sonnet
    context: fresh
    timeout_seconds: 600

  - id: secure
    skill: secure
    depends_on: [harden]
    gate: after-harden
    model: sonnet
    context: fresh
    timeout_seconds: 600

  - id: review
    skill: review
    depends_on: [secure]
    gate: after-secure
    model: sonnet
    context: fresh
    timeout_seconds: 600

  - id: report
    depends_on: [harden, secure, review]
    trigger_rule: all_done
    command: |
      Read all audit findings files in the project root:
        - review-harden-findings.md
        - review-secure-findings.md
        - review-review-findings.md

      For each file: if missing, note as SKIPPED. If present, extract all findings with
      their severity tags (Critical / High / Medium / Low).

      Synthesize a final audit report with:
        1. Executive summary — pass/fail verdict per phase (Harden / Security / Review)
        2. All findings grouped by severity (Critical first)
        3. Recommended fix order
        4. Overall verdict: PASSED if no Critical or High findings, BLOCKED otherwise

      PERSISTENT STORAGE:
      Derive the project slug from the cwd basename, lowercased with spaces replaced by hyphens.
      Get today's date as YYYY-MM-DD.
      Save the complete audit report to:
        ~/.dream-studio/secure/reports/audit-<project-slug>-<YYYY-MM-DD>.md
      Create the directory if it does not exist (mkdir -p).
      Print the saved path so the user knows where to find the report.

      GITHUB ISSUE CREATION (HIGH/CRITICAL findings only):
      After saving the report, check if a github_repo parameter was provided to this workflow
      invocation (format: owner/repo). If not provided, attempt to infer it by running:
        git remote get-url origin
      and parsing the owner/repo from the URL.

      If a repo can be determined and mcp__github__issue_write is available:
        For each HIGH or CRITICAL finding:
          - Create a GitHub Issue with:
              title: "[AUDIT] <SEVERITY>: <finding title>"
              body: "<finding description>\n\n**Recommended fix:** <fix>\n\n---\n_Generated by dream-studio project-audit workflow on <date>_"
              labels: ["audit"]
          - If the "audit" label does not exist in the repo, create it first (color: #e11d48).
          - Print each created issue URL.
      If GitHub is not configured or no repo can be determined:
        Skip issue creation silently and note "GitHub Issues skipped — no repo configured" in the report.

      Your final output line MUST be exactly one of: PASSED, BLOCKED, FAILED.
      Format: VERDICT: one-line summary of what was found.
    model: sonnet
    context: fresh
    timeout_seconds: 300
