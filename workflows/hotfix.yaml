name: hotfix
description: Fast debug-fix-verify cycle for production issues
version: 2
on_failure: abort

gates:
  evidence-required:
    type: pause
    requires: [test-results]

nodes:
  - id: debug
    skill: debug
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: build
    skill: build
    depends_on: [debug]
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15
    input: "{{debug.output}}"

  - id: verify
    skill: verify
    depends_on: [build]
    gate: evidence-required
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15

  - id: ship
    skill: ship
    depends_on: [verify]
    model: sonnet
    context: fresh
    timeout_seconds: 600
