name: hotfix
description: Fast debug-fix-verify cycle for production issues
version: 2
on_failure: abort

gates:
  evidence-required:
    type: pause
    requires: [test-results]

nodes:
  - id: debug
    skill: debug
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: build
    skill: build
    depends_on: [debug]
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15
    input: "{{debug.output}}"

  - id: verify
    skill: verify
    depends_on: [build]
    gate: evidence-required
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15

  - id: ship
    skill: ship
    depends_on: [verify]
    model: sonnet
    context: fresh
    timeout_seconds: 600

  - id: record
    depends_on: [ship]
    command: |
      Extract the PR URL from the ship node output (look for a github.com/.../pull/... URL).
      Get today's date as YYYY-MM-DD.
      Save a one-line record to:
        ~/.dream-studio/state/hotfix-prs.log
      Format of each line: "<YYYY-MM-DD>  <PR URL>  <one-sentence description of the fix>"
      Create the directory if it does not exist (mkdir -p).
      Print the PR URL clearly so the user can open it immediately.
    model: haiku
    context: fresh
    timeout_seconds: 120
