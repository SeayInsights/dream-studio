name: fix-issue
description: Diagnose a bug, plan a fix, implement, review, and verify
version: 1
on_failure: abort

gates:
  director-approval:
    type: pause
    prompt: "Approve fix approach?"
  auto-pass:
    type: conditional
    condition: quality-score > 3
  evidence-required:
    type: pause
    requires: [screenshots, test-results]

nodes:
  - id: diagnose
    skill: debug
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: plan-fix
    skill: plan
    depends_on: [diagnose]
    model: haiku
    context: fresh
    timeout_seconds: 300
    input: "{{diagnose.output}}"

  - id: implement-fix
    skill: build
    depends_on: [plan-fix]
    gate: director-approval
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15
    input: "{{plan-fix.output}}"

  - id: review
    skill: review
    depends_on: [implement-fix]
    gate: auto-pass
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: verify
    skill: verify
    depends_on: [review]
    gate: evidence-required
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15

  - id: report
    depends_on: [verify]
    command: |
      Summarize the fix: what was wrong, what changed, how it was verified.
      Include file paths and commit references.

      PERSISTENT STORAGE:
      Get today's date as YYYY-MM-DD.
      Save this summary to:
        .sessions/<YYYY-MM-DD>/fix-report.md
      Create the directory if it does not exist (mkdir -p).
      Print the saved path so the user has a session record of what was fixed.
    model: haiku
    context: fresh
    timeout_seconds: 180
