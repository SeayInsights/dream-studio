name: idea-to-pr
description: Feature concept through implementation to merged PR
version: 1
on_failure: abort

gates:
  director-approval:
    type: pause
    prompt: "Approve to continue?"
  auto-pass:
    type: conditional
    condition: quality-score > 3
  evidence-required:
    type: pause
    requires: [screenshots, test-results]

nodes:
  - id: think
    skill: think
    gate: director-approval
    model: opus
    context: fresh
    timeout_seconds: 300

  - id: plan
    skill: plan
    depends_on: [think]
    gate: director-approval
    model: opus
    context: fresh
    timeout_seconds: 300
    input: "{{think.output}}"

  - id: build
    skill: build
    depends_on: [plan]
    gate: auto-pass
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15
    input: "{{plan.output}}"

  - id: review-code
    skill: review
    depends_on: [build]
    model: sonnet
    context: fresh
    timeout_seconds: 300
    agent: engineering

  - id: review-security
    skill: secure
    depends_on: [build]
    model: sonnet
    context: fresh
    timeout_seconds: 300
    agent: engineering

  - id: review-tests
    skill: review
    depends_on: [build]
    model: haiku
    context: fresh
    timeout_seconds: 300
    config:
      focus: test-coverage-only

  - id: review-perf
    skill: review
    depends_on: [build]
    model: haiku
    context: fresh
    timeout_seconds: 300
    config:
      focus: performance-only

  - id: review-docs
    skill: review
    depends_on: [build]
    model: haiku
    context: fresh
    timeout_seconds: 300
    config:
      focus: docs-impact-only

  - id: synthesize
    depends_on: [review-code, review-security, review-tests, review-perf, review-docs]
    trigger_rule: all_done
    command: |
      Read all review findings files:
      - review-review-code-findings.md
      - review-review-security-findings.md
      - review-review-tests-findings.md
      - review-review-perf-findings.md
      - review-review-docs-findings.md

      For each file: if missing, note as SKIPPED. If present, extract findings with severity tags.
      Synthesize into review-synthesize-findings.md: combined, de-duplicated, sorted by severity.

      Decision:
      - Any Critical or High → BLOCKED
      - Medium/Low only or all SKIPPED → PASSED

      Your final output line MUST be exactly one of: PASSED, BLOCKED, FAILED.
      Format: VERDICT: one-line summary.
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: fix-findings
    skill: build
    depends_on: [synthesize]
    condition: "{{synthesize.output}} == BLOCKED"
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15
    input: "{{synthesize.output}}"

  - id: triage-security
    skill: secure
    depends_on: [synthesize]
    condition: "{{synthesize.security_signal}} == blocked or {{synthesize.security_signal}} == strong_reject"
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: mitigate-findings
    skill: mitigate
    depends_on: [triage-security]
    condition: "{{synthesize.security_signal}} == blocked or {{synthesize.security_signal}} == strong_reject"
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: verify
    skill: verify
    depends_on: [synthesize, fix-findings, mitigate-findings]
    trigger_rule: all_done
    gate: evidence-required
    model: sonnet
    context: fresh
    timeout_seconds: 600
    retry:
      max: 1
      backoff_seconds: 15

  - id: ship
    skill: ship
    depends_on: [verify]
    model: sonnet
    context: fresh
    timeout_seconds: 600

  - id: record
    depends_on: [ship]
    command: |
      Extract the PR URL from the ship node output (look for a github.com/.../pull/... URL).
      Get today's date as YYYY-MM-DD.
      Save a one-line record to:
        ~/.dream-studio/state/idea-to-pr.log
      Format of each line: "<YYYY-MM-DD>  <PR URL>  <one-sentence description of the feature>"
      Create the directory if it does not exist (mkdir -p).
      Print the PR URL clearly so the user can open it immediately.
    model: haiku
    context: fresh
    timeout_seconds: 120
