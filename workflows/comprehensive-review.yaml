name: comprehensive-review
description: Five-way parallel review with synthesis report
version: 1
on_failure: abort

nodes:
  - id: review-code
    skill: review
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: review-security
    skill: secure
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: review-tests
    skill: review
    model: haiku
    context: fresh
    timeout_seconds: 300
    config:
      focus: test-coverage-only

  - id: review-perf
    skill: review
    model: haiku
    context: fresh
    timeout_seconds: 300
    config:
      focus: performance-only

  - id: review-docs
    skill: review
    model: haiku
    context: fresh
    timeout_seconds: 300
    config:
      focus: docs-impact-only

  - id: synthesize
    depends_on: [review-code, review-security, review-tests, review-perf, review-docs]
    trigger_rule: all_done
    command: |
      Read all review reports (review-{node-id}-findings.md for each review node).
      Synthesize into one findings document with severity tags (Critical/High/Medium/Low).
      List actionable items grouped by severity.
    model: sonnet
    context: fresh
    timeout_seconds: 300

  - id: report
    depends_on: [synthesize]
    command: |
      Format the synthesized findings as a summary suitable for posting as a PR comment
      or sharing with the team. Include a pass/fail recommendation.

      PERSISTENT STORAGE:
      Derive the project slug from the cwd basename, lowercased with spaces replaced by hyphens.
      Get today's date as YYYY-MM-DD.
      Save the complete report to:
        ~/.dream-studio/secure/reports/review-<project-slug>-<YYYY-MM-DD>.md
      Create the directory if it does not exist (mkdir -p).
      Print the saved path.

      GITHUB ISSUE CREATION (HIGH/CRITICAL findings only):
      Attempt to infer the GitHub repo by running:
        git remote get-url origin
      and parsing the owner/repo from the URL.

      If a repo can be determined and mcp__github__issue_write is available:
        For each HIGH or CRITICAL finding:
          - Create a GitHub Issue with:
              title: "[REVIEW] <SEVERITY>: <finding title>"
              body: "<finding description>\n\n**Recommended fix:** <fix>\n\n---\n_Generated by dream-studio comprehensive-review workflow on <date>_"
              labels: ["review", "audit"]
          - If either label does not exist in the repo, create it first.
          - Print each created issue URL.
      If GitHub is not configured or no repo can be determined:
        Skip issue creation silently and note it in the report.
    model: haiku
    context: fresh
    timeout_seconds: 180
