repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
  - repo: local
    hooks:
      - id: conventional-commits
        name: Conventional commit message format
        language: pygrep
        entry: '^(feat|fix|docs|chore|refactor|test|ci|style|perf|build|revert)(\(.+\))?: .{1,72}'
        stages: [commit-msg]
      - id: forbid-scrubbed-identifiers
        name: Block re-introduction of scrubbed personal/client identifiers
        description: >
          Phase 18.1.14a scrubbed personal email, former-client name, and related
          identifying information. This hook prevents accidental re-introduction.
          To add an intentional exemption, update EXEMPT_FILES in
          scripts/check_scrubbed_identifiers.py.
        entry: python scripts/check_scrubbed_identifiers.py
        language: system
        types: [text]
        pass_filenames: true
